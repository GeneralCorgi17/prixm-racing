async function loadPasted(){
  try{
    const raw=document.getElementById('jsonPaste').value.trim();
    if(!raw){throw new Error('Paste box is empty. Paste the contents of daily_race_data.json here.')}
    let parsed;
    try{parsed=JSON.parse(raw)}catch(pe){
      throw new Error('Not valid JSON. Make sure you copied the entire file contents from daily_race_data.json (open it with Notepad, Ctrl+A to select all, Ctrl+C to copy).');
    }
    if(!parsed.venues){
      throw new Error('Missing "venues" key. This file may be a raw race card — it needs to be processed first by running: python racecard_fetcher.py');
    }
    if(!Object.keys(parsed.venues).length){
      throw new Error('The JSON has no venue data (empty "venues"). The fetcher may have found no races for this date.');
    }
    D=filterExcludedVenues(parsed);
    window._dataSource='stored';
    saveDayData(D);
    closeModal();
    st.openRace=null; st.venue='all';
    await render();
  }catch(e){
    document.getElementById('pasteErr').textContent=e.message;
  }
}

function getBetType(runner, fieldSize){
  // Recommend bet type based on probability analysis relative to field size
  const fs=fieldSize||12;
  const s=runner.score||0;
  // Recalculate key probabilities
  function cp(topN){const n=s/MAX_SCORE;const bl=Math.min(topN/fs,1);const sk=Math.pow(n,2);return Math.min(Math.max(Math.round((bl+sk*(1-bl)*0.75)*100),5),95)}
  const pWin=cp(1), pTop2=cp(2), pTop3=cp(3), pTop4=cp(4);

  const pl=getPlaceLimit(fs);
  const pPlace=cp(pl);
  if(pWin>=45 && fs<=8) return {type:'WIN',cls:'tp-win',desc:`Win ${pWin}%`};
  if(pWin>=40) return {type:'WIN',cls:'tp-win',desc:`Win ${pWin}%`};
  if(pWin>=30 && pPlace>=55) return {type:'WIN/EW',cls:'tp-win',desc:`Win ${pWin}% · Place ${pPlace}%`};
  if(pPlace>=50) return {type:'EW',cls:'tp-ew',desc:`Place ${pPlace}% (top ${pl})`};
  if(pTop4>=50 && fs>=8) return {type:'EW',cls:'tp-ew',desc:`Top 4 ${pTop4}%`};
  if(pPlace>=40) return {type:'PLACE',cls:'tp-place',desc:`Place ${pPlace}% (top ${pl})`};
  return {type:'PLACE',cls:'tp-place',desc:`Place ${pPlace}% (top ${pl})`};
}

/* ==================== TOP 10 PICKS SYSTEM ==================== */
function calcAdjScore(runner,adj){
  // Calculate adjusted score using feedback-loop factor adjustments
  if(!adj||!runner.score_breakdown) return runner.score;
  let s=0;
  Object.keys(runner.score_breakdown).forEach(f=>{s+=runner.score_breakdown[f]*(adj[f]||1);});
  return s;
}

function getTop10Picks(data){
  // Smart selection: when feedback adjustments exist, consider top 3 per race
  // and pick the horse that scores best under adjusted weights (may reject raw #1)
  if(!data||!data.venues) return [];
  const adj=getPicksFactorAdjustments();
  let racePicks=[];
  Object.entries(data.venues).forEach(([vk,venue])=>{
    // Double-check excluded venues (safety net in case data wasn't pre-filtered)
    const vName=(venue.course||vk).toLowerCase();
    if(EXCLUDED_VENUES.some(ex=>vName.includes(ex))) return;
    venue.races.forEach((race,ri)=>{
      if(!race.runners||!race.runners.length) return;
      const sorted=[...race.runners].sort((a,b)=>b.score-a.score);
      const fs=race.field_size||race.runners.length;
      const avgScore=race.runners.reduce((a,r)=>a+r.score,0)/race.runners.length;
      // If we have adjustments, evaluate top 3 candidates under adjusted weights
      let chosen;
      let wasOverridden=false;
      if(adj){
        const candidates=sorted.slice(0,Math.min(3,sorted.length));
        // Score each candidate under adjusted weights
        const scored=candidates.map(c=>({runner:c,adjScore:calcAdjScore(c,adj)}));
        scored.sort((a,b)=>b.adjScore-a.adjScore);
        chosen=scored[0].runner;
        wasOverridden=(chosen.name!==sorted[0].name);
      }else{
        chosen=sorted[0];
      }
      const adjScore=calcAdjScore(chosen,adj);
      const second=sorted.find(r=>r.name!==chosen.name)||sorted[1];
      const gap=second?(chosen.score-second.score):chosen.score;
      const deltaFromAvg=chosen.score-avgScore;
      // Composite: adjusted score (70%) + spread (15%) + dominance (15%)
      const spreadBonus=Math.min(Math.max(gap,0)/20,1)*15;
      const domBonus=Math.min(Math.max(deltaFromAvg,0)/40,1)*15;
      const composite=adjScore*0.7+spreadBonus+domBonus;
      racePicks.push({
        horse:chosen.name, score:chosen.score, adjScore:Math.round(adjScore*10)/10,
        composite:Math.round(composite*10)/10,
        confidence:chosen.confidence, venue:venue.course, time:race.time,
        raceName:race.name, trainer:chosen.trainer, jockey:chosen.jockey,
        form:chosen.form, fieldSize:fs, gap:Math.round(Math.abs(gap)*10)/10,
        bet:getBetType(chosen,fs), venueKey:vk, raceIdx:ri,
        scoreBreakdown:chosen.score_breakdown||{},
        hasAdj:!!adj, wasOverridden,
        rawTop:sorted[0].name
      });
    });
  });
  racePicks.sort((a,b)=>b.composite-a.composite);
  return racePicks.slice(0,10).map((p,i)=>({...p,rank:i+1}));
}

// Field-size-aware place limit (mirrors bookmaker place terms)
// 2-4 runners: 1 (win only), 5-7: 2, 8-15: 3, 16+: 4
function getPlaceLimit(fs){
  if(fs<=4) return 1;
  if(fs<=7) return 2;
  if(fs<=15) return 3;
  return 4;
}

function getPickResult(pick,hist){
  // Check results history for this pick's race
  if(!hist||!hist.races) return null;
  const dateStr=D.date||'';
  const dupKey=dateStr+pick.venueKey+pick.time;
  const raceResult=hist.races.find(r=>(r.date+r.venue+r.time)===dupKey);
  if(!raceResult) return null; // not logged yet
  const horseResult=raceResult.results.find(r=>r.name===pick.horse);
  if(!horseResult) return null;
  if(horseResult.non_runner) return {status:'nr',pos:null,label:'NR'};
  if(horseResult.pull_out) return {status:'pu',pos:null,label:'PU'};
  const pos=horseResult.finish_pos;
  if(!pos) return null;
  const fs=pick.fieldSize||raceResult.field_size||12;
  const placeLimit=getPlaceLimit(fs);
  if(pos===1) return {status:'won',pos,label:'1st — WON'};
  if(pos<=placeLimit) return {status:'placed',pos,label:ordinal(pos)+' — PLACED'};
  return {status:'lost',pos,label:ordinal(pos)};
}

function ordinal(n){const s=['th','st','nd','rd'];const v=n%100;return n+(s[(v-20)%10]||s[v]||s[0])}

function analyzePicksPerformance(picks,hist){
  // Analyze how picks performed: wins, places, factor patterns
  // Also track how AVOID/WEAK horses did in the same races (reverse validation)
  let total=0,wins=0,places=0,logged=0,nrs=0;
  let avoidsTotal=0,avoidsBottomHalf=0,avoidsBottomQ=0;
  const factorWins={},factorLosses={};
  const factors=['form','rating','trainer','jockey','fitness','class','going','course','distance','age','weight','draw','headgear','spotlight'];
  picks.forEach(p=>{
    const res=getPickResult(p,hist);
    total++;
    if(!res) return;
    if(res.status==='nr'||res.status==='pu'){nrs++;return;}
    logged++;
    const bd=p.scoreBreakdown||{};
    if(res.status==='won'||res.status==='placed'){
      if(res.status==='won') wins++;
      places++;
      factors.forEach(f=>{if(bd[f]!==undefined){factorWins[f]=(factorWins[f]||0)+bd[f];}});
    }else{
      factors.forEach(f=>{if(bd[f]!==undefined){factorLosses[f]=(factorLosses[f]||0)+bd[f];}});
    }
    // Check AVOID/WEAK horses in this pick's race
    const dateStr=D.date||'';
    const dupKey=dateStr+p.venueKey+p.time;
    const raceResult=hist&&hist.races?hist.races.find(r=>(r.date+r.venue+r.time)===dupKey):null;
    if(raceResult){
      const fs=p.fieldSize||raceResult.field_size||12;
      raceResult.results.forEach(r=>{
        if(r.non_runner||r.pull_out||!r.finish_pos) return;
        const conf=r.predicted_confidence||'';
        if(conf==='AVOID'||conf==='WEAK'){
          avoidsTotal++;
          if(r.finish_pos>Math.ceil(fs/2)) avoidsBottomHalf++;
          if(r.finish_pos>Math.ceil(fs*0.75)) avoidsBottomQ++;
        }
      });
    }
  });
  return {total,wins,places,logged,nrs,factorWins,factorLosses,avoidsTotal,avoidsBottomHalf,avoidsBottomQ};
}

function generateFeedbackInsights(perf,prevPerf){
  // Generate actionable insights from performance data
  const insights=[];
  if(perf.logged===0) return insights;
  const factors=['form','rating','trainer','jockey','fitness','class','going','course','distance','age','weight','draw','headgear','spotlight'];
  const maxes={form:20,rating:15,trainer:12,jockey:10,fitness:8,class:8,going:8,course:6,distance:6,age:7,weight:8,draw:5,headgear:3,spotlight:2};
  // Factor analysis: which factors were strongest in winners vs losers
  const winCount=perf.places||1;
  const lossCount=Math.max(perf.logged-perf.places,1);
  let strongFactors=[],weakFactors=[];
  factors.forEach(f=>{
    const winAvg=(perf.factorWins[f]||0)/winCount;
    const lossAvg=(perf.factorLosses[f]||0)/lossCount;
    const maxF=maxes[f]||1;
    const winPct=Math.round(winAvg/maxF*100);
    const lossPct=Math.round(lossAvg/maxF*100);
    if(winPct>=70&&(winPct-lossPct)>=15) strongFactors.push({f,winPct,lossPct});
    if(lossPct>=60&&(lossPct-winPct)>=10) weakFactors.push({f,winPct,lossPct});
  });
  // Win rate insight
  const winRate=Math.round(perf.wins/perf.logged*100);
  const placeRate=Math.round(perf.places/perf.logged*100);
  insights.push(`<b>Win rate:</b> <span class="${winRate>=30?'positive':'negative'}">${perf.wins}/${perf.logged} (${winRate}%)</span> · <b>Place rate:</b> <span class="${placeRate>=50?'positive':'negative'}">${perf.places}/${perf.logged} (${placeRate}%)</span>`);
  // Strong factors
  if(strongFactors.length){
    insights.push(`<b>Strong predictors:</b> ${strongFactors.map(f=>`<span class="positive">${f.f} (${f.winPct}% in winners vs ${f.lossPct}% in losers)</span>`).join(', ')}`);
  }
  // Weak factors
  if(weakFactors.length){
    insights.push(`<b>Watch out:</b> ${weakFactors.map(f=>`<span class="negative">${f.f} scored high in losers too (${f.lossPct}%)</span>`).join(', ')} — these factors didn't differentiate winners from losers`);
  }
  // Reverse validation: AVOID/WEAK accuracy
  if(perf.avoidsTotal>0){
    const avBotRate=Math.round(perf.avoidsBottomHalf/perf.avoidsTotal*100);
    const avBQRate=Math.round(perf.avoidsBottomQ/perf.avoidsTotal*100);
    const avLabel=avBotRate>=60?'positive':avBotRate>=40?'neutral':'negative';
    insights.push(`<b>Avoid/Weak accuracy:</b> <span class="${avLabel}">${perf.avoidsBottomHalf}/${perf.avoidsTotal} finished bottom half (${avBotRate}%)</span> · <span class="${avLabel}">${perf.avoidsBottomQ}/${perf.avoidsTotal} bottom quartile (${avBQRate}%)</span>`);
  }
  // Day-over-day comparison
  if(prevPerf&&prevPerf.logged>0){
    const prevWinRate=Math.round(prevPerf.wins/prevPerf.logged*100);
    const delta=winRate-prevWinRate;
    if(delta>0) insights.push(`<span class="positive">↑ Win rate improved by ${delta}% from previous day</span>`);
    else if(delta<0) insights.push(`<span class="negative">↓ Win rate dropped by ${Math.abs(delta)}% from previous day</span>`);
    else insights.push(`<span class="neutral">→ Win rate unchanged from previous day</span>`);
  }
  return insights;
}

// ==================== CONFIDENCE THRESHOLD OPTIMIZER (Engine 2) ====================
// Scans ALL historical Top 10 picks, groups by composite score, finds the cutoff
// where placed rate hits the target (80%). Picks above threshold = confident bets.
async function computeThresholdAnalysis(){
  const allDates=getAllPicksDates();
  const hist=window._resultsHistory;
  if(!hist||!hist.races||allDates.length<1) return null;
  // Collect all historical picks with outcomes
  const dataPoints=[];
  const origD=D;
  for(const date of allDates){
    const pd=loadTop10Picks(date);
    if(!pd||!pd.picks) continue;
    const dayData=await loadDayData(date);
    if(!dayData) return;
    D={date,venues:dayData.venues};
    pd.picks.forEach(p=>{
      const res=getPickResult(p,hist);
      if(!res) return;
      if(res.status==='nr'||res.status==='pu') return;
      const placed=res.status==='won'||res.status==='placed';
      dataPoints.push({composite:p.composite,placed,date,horse:p.horse});
    });
  }
  D=origD;
  if(dataPoints.length<10) return null; // need minimum sample
  // Sort by composite score descending
  dataPoints.sort((a,b)=>b.composite-a.composite);
  // Build threshold curve: at each composite score, compute placed rate for picks >= that score
  const thresholds=[];
  const step=2; // 2-point increments
  const minComp=Math.floor(Math.min(...dataPoints.map(d=>d.composite)));
  const maxComp=Math.ceil(Math.max(...dataPoints.map(d=>d.composite)));
  for(let t=maxComp;t>=minComp;t-=step){
    const above=dataPoints.filter(d=>d.composite>=t);
    if(above.length<3) continue;
    const placedCount=above.filter(d=>d.placed).length;
    const rate=Math.round(placedCount/above.length*100);
    thresholds.push({threshold:t,placedRate:rate,count:above.length,placedCount});
  }
  if(!thresholds.length) return null;
  // Find optimal threshold: highest composite where placed rate >= 80% with decent sample
  let optimalThreshold=null;
  for(const t of thresholds){
    if(t.placedRate>=80&&t.count>=5){
      optimalThreshold=t;
      break; // first one (highest threshold) that hits 80%
    }
  }
  // If no threshold hits 80%, find the best available
  if(!optimalThreshold){
    // Get the threshold with highest placed rate that has 5+ picks
    const viable=thresholds.filter(t=>t.count>=5);
    if(viable.length) optimalThreshold=viable.reduce((best,t)=>t.placedRate>best.placedRate?t:best,viable[0]);
  }
  // Below threshold stats
  const belowData=optimalThreshold?dataPoints.filter(d=>d.composite<optimalThreshold.threshold):[];
  const belowPlaced=belowData.filter(d=>d.placed).length;
  const belowRate=belowData.length?Math.round(belowPlaced/belowData.length*100):0;
  return {
    optimalThreshold:optimalThreshold?optimalThreshold.threshold:null,
    placedRateAbove:optimalThreshold?optimalThreshold.placedRate:0,
    countAbove:optimalThreshold?optimalThreshold.count:0,
    placedRateBelow:belowRate,
    countBelow:belowData.length,
    totalPicks:dataPoints.length,
    curve:thresholds,
    hitsTarget:optimalThreshold?optimalThreshold.placedRate>=80:false
  };
}

async function renderTopPicks(){
  const el=document.getElementById('topPicksSection');
  if(!D||!D.venues){el.innerHTML='';return}
  const currentDate=D.date||'';
  // LOCK: if picks already saved for this date, use those (don't recalculate)
  const savedPicks=loadTop10Picks(currentDate);
  let picks;
  if(savedPicks&&savedPicks.picks&&savedPicks.picks.length>0){
    picks=savedPicks.picks;
  }else{
    picks=getTop10Picks(D);
    if(!picks.length){el.innerHTML='';return}
    saveTop10Picks(currentDate,picks);
  }
  const hist=window._resultsHistory;
  // Get results for each pick
  const picksWithResults=picks.map(p=>({...p,result:getPickResult(p,hist)}));
  // Performance stats
  const perf=analyzePicksPerformance(picks,hist);
  const allDates=getAllPicksDates();
  // Get previous day performance for comparison
  let prevPerf=null;
  const prevDate=allDates.find(d=>d<currentDate);
  if(prevDate){
    const prevData=loadTop10Picks(prevDate);
    if(prevData&&prevData.picks){
      // Load that day's data for results checking
      const prevDayData=await loadDayData(prevDate);
      if(prevDayData){
        const tmpD=D;D={date:prevDate,venues:prevDayData.venues};
        prevPerf=analyzePicksPerformance(prevData.picks,hist);
        D=tmpD;
      }
    }
  }
  // Score badge + submit button
  let scoreBadge='';
  if(perf.logged>0){
    const cls=perf.wins>=perf.logged*0.4?'tp-score-good':perf.wins>=perf.logged*0.2?'tp-score-ok':'tp-score-bad';
    scoreBadge=`<span class="tp-score-badge ${cls}">${perf.wins}/${perf.logged} Winners · ${perf.places}/${perf.logged} Placed</span>`;
  }else{
    scoreBadge=`<span class="tp-score-badge tp-score-pending">${perf.logged}/${perf.total} Logged</span>`;
  }
  // Show submit button when at least 3 picks have results but calibration hasn't run yet (or user wants to re-run)
  const calHist0=getPicksCalibrationHistory();
  const alreadyCal=calHist0&&calHist0.history&&calHist0.history.some(h=>h.date===currentDate);
  const submitBtn=alreadyCal
    ?`<span style="font-size:11px;color:var(--accent);font-weight:600;padding:4px 10px;border-radius:6px;background:rgba(5,150,105,.1)">✓ Submitted</span>`
    :perf.logged>=3?`<button onclick="event.stopPropagation();submitPickResults()" style="padding:5px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--gold);background:rgba(251,191,36,.15);color:var(--gold);transition:all .2s" title="Submit picks results to improve next day picks">⚡ Submit Pick Results</button>`:'';
  // Feedback insights
  const insights=generateFeedbackInsights(perf,prevPerf);
  // Confidence Threshold Optimizer
  const threshData=computeThresholdAnalysis();
  const hasThresh=threshData&&threshData.optimalThreshold!==null;
  const threshVal=hasThresh?threshData.optimalThreshold:0;
  // Threshold info strip
  let threshStrip='';
  if(hasThresh){
    const aboveCount=picksWithResults.filter(p=>p.composite>=threshVal).length;
    const belowCount=picksWithResults.length-aboveCount;
    const tColor=threshData.hitsTarget?'var(--accent)':'var(--warn)';
    threshStrip=`<div style="background:rgba(${threshData.hitsTarget?'5,150,105':'245,158,11'},.1);border:1px solid rgba(${threshData.hitsTarget?'5,150,105':'245,158,11'},.3);border-radius:8px;padding:8px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
      <div style="font-size:12px"><span style="font-weight:700;color:${tColor}">Confidence Threshold: ${threshVal}+ composite</span> <span style="color:var(--muted)">· Placed rate above: ${threshData.placedRateAbove}% (${threshData.countAbove} picks) · Below: ${threshData.placedRateBelow}% (${threshData.countBelow} picks)</span></div>
      <div style="font-size:11px;font-weight:600"><span style="color:var(--accent)">${aboveCount} BET</span> <span style="color:var(--muted)">·</span> <span style="color:${belowCount?'#ef4444':'var(--muted)'}">${belowCount} SKIP</span></div>
    </div>`;
  }
  // Build progress bar and stats
  const pWon=picksWithResults.filter(p=>p.result&&p.result.status==='won').length;
  const pPlaced=picksWithResults.filter(p=>p.result&&p.result.status==='placed').length;
  const pLost=picksWithResults.filter(p=>p.result&&p.result.status==='lost').length;
  const pNR=picksWithResults.filter(p=>p.result&&(p.result.status==='nr'||p.result.status==='pu')).length;
  const pPending=picksWithResults.filter(p=>!p.result).length;
  const pTotal=picksWithResults.length;
  const pLogged=pWon+pPlaced+pLost;
  const pWinRate=pLogged?Math.round(pWon/pLogged*100):0;
  const pPlaceRate=pLogged?Math.round((pWon+pPlaced)/pLogged*100):0;
  const segW=pTotal?Math.round(pWon/pTotal*100):0;
  const segP=pTotal?Math.round(pPlaced/pTotal*100):0;
  const segL=pTotal?Math.round(pLost/pTotal*100):0;

  const progressBar=`<div class="tp-progress">
    <div class="tp-progress-bar"><div class="seg-won" style="width:${segW}%"></div><div class="seg-placed" style="width:${segP}%"></div><div class="seg-lost" style="width:${segL}%"></div><div class="seg-pending" style="width:${100-segW-segP-segL}%"></div></div>
    <div class="tp-progress-counts">${pWon?`<span class="ct-won">${pWon}W</span>`:''}${pPlaced?`<span class="ct-placed">${pPlaced}P</span>`:''}${pLost?`<span class="ct-lost">${pLost}L</span>`:''}${pNR?`<span class="ct-pending">${pNR} NR</span>`:''}${pPending?`<span class="ct-pending">${pLogged?'· ':''}${pPending} pending</span>`:''}<span class="ct-pending">${!pLogged?pLogged+'/'+pTotal+' Logged':''}</span></div>
    ${submitBtn}
  </div>`;

  const statsRow=pLogged>0?`<div class="tp-stats-row">
    <div class="tp-stat"><div><div class="tp-stat-num" style="color:#34d399">${pWon}</div><div class="tp-stat-label">Winners</div></div></div>
    <div class="tp-stat"><div><div class="tp-stat-num" style="color:#60a5fa">${pPlaced}</div><div class="tp-stat-label">Placed</div></div></div>
    <div class="tp-stat"><div><div class="tp-stat-num" style="color:#f87171">${pLost}</div><div class="tp-stat-label">Lost</div></div></div>
    ${pNR?`<div class="tp-stat"><div><div class="tp-stat-num" style="color:var(--muted)">${pNR}</div><div class="tp-stat-label">NR</div></div></div>`:`<div class="tp-stat"><div><div class="tp-stat-num" style="color:var(--muted)">${pPending}</div><div class="tp-stat-label">Pending</div></div></div>`}
    <div class="tp-stat"><div><div class="tp-stat-num" style="color:var(--gold)">${pWinRate}%</div><div class="tp-stat-label">Win Rate</div></div></div>
    <div class="tp-stat"><div><div class="tp-stat-num" style="color:var(--accent)">${pPlaceRate}%</div><div class="tp-stat-label">Place Rate</div></div></div>
  </div>`:'';

  el.innerHTML=`<div class="tp-section">
    <div class="tp-header">
      <div class="tp-title">⭐ Top 10 Picks of the Day <span>Best horse per race · ${currentDate}</span></div>
      ${progressBar}
    </div>
    ${statsRow}
    ${threshStrip}
    <div class="tp-grid">
      ${picksWithResults.map(p=>{
        const hasRes=!!p.result;
        const st=hasRes?p.result.status:'';
        const resCls=st==='won'?'tp-won':st==='placed'?'tp-placed':st==='lost'?'tp-lost':(st==='nr'||st==='pu')?'tp-nr':'tp-pending';
        // Result banner
        const banner=st==='won'?'<div class="tp-result-banner trb-won">✓ WON</div>':st==='placed'?'<div class="tp-result-banner trb-placed">PLACED</div>':st==='lost'?'<div class="tp-result-banner trb-lost">LOST</div>':(st==='nr'||st==='pu')?'<div class="tp-result-banner trb-nr">NR</div>':'';
        // Finish position badge
        const finishBadge=hasRes&&p.result.pos?`<span class="tp-finish-pos ${st==='won'?'fp-won':st==='placed'?'fp-placed':'fp-lost'}">${ordinal(p.result.pos)}</span>`:hasRes&&(st==='nr'||st==='pu')?`<span class="tp-finish-pos fp-nr">NR</span>`:'';
        // Threshold badge (only when no result yet)
        const aboveThresh=hasThresh&&p.composite>=threshVal;
        const belowThresh=hasThresh&&p.composite<threshVal;
        const threshBadge=!hasRes&&hasThresh?(aboveThresh?`<span class="thresh-badge thresh-bet" title="Composite ${p.composite} >= ${threshVal} threshold">✓ BET</span>`:`<span class="thresh-badge thresh-skip" title="Composite ${p.composite} < ${threshVal} threshold">⚠ SKIP</span>`):'';
        const dimCard=!hasRes&&belowThresh?' style="opacity:0.55"':'';
        // Bet type with tick if landed
        const betLanded=(st==='won'&&p.bet.type==='WIN')||(st==='placed'&&(p.bet.type==='E/W'||p.bet.type==='PLACE'))||(st==='won'&&(p.bet.type==='E/W'||p.bet.type==='PLACE'));
        const betLabel=betLanded?p.bet.type+' ✓':p.bet.type;
        const overrideTag=p.wasOverridden?`<span style="font-size:9px;color:var(--warn);display:block;margin-top:1px" title="Feedback engine chose this over raw #1: ${p.rawTop}">⚡ Override — raw #1 was ${p.rawTop}</span>`:'';
        return `<div class="tp-card ${resCls}"${dimCard} onclick="openRace('${p.venueKey}',${p.raceIdx}).catch(e=>console.error('openRace error:',e))">
        ${banner}
        <div class="tp-rank">${p.rank}</div>
        <div class="tp-card-body">
          <div class="tp-card-top">
            <span class="tp-venue-time"><span class="vt-venue">${p.venue}</span><span class="vt-time">${p.time}</span></span>
            ${threshBadge}
          </div>
          <div class="tp-horse-row">
            <div class="tp-horse">${p.horse}</div>
            ${finishBadge}
          </div>
          ${overrideTag}
          <div class="tp-meta">${p.trainer} · ${p.jockey} · Form: ${p.form||'—'}${(()=>{const m=calcMomentum(p.form);return m.label!=='UNKNOWN'?` <span class="mom ${m.cls}" style="padding:1px 4px;font-size:8px">${m.icon}</span>`:''})()}· ${p.fieldSize}r · Gap: +${p.gap}</div>
          <div class="tp-bottom">
            <span class="tp-bet ${p.bet.cls}">${betLabel}</span>
            <span class="tp-score-info">${p.composite} comp · ${p.score}/${MAX_SCORE} (${p.confidence})</span>
          </div>
        </div>
      </div>`;
      }).join('')}
    </div>
    ${allDates.length>1?`<div class="tp-history">
      ${(await Promise.all(allDates.slice(0,14).map(async d=>{
        const pd=loadTop10Picks(d);
        if(!pd||!pd.picks) return '';
        const isActive=d===currentDate;
        const dayData=await loadDayData(d);
        let wins=0,logged=0;
        if(dayData&&hist&&hist.races){
          const tmpD2=D;D={date:d,venues:dayData.venues};
          const dp=analyzePicksPerformance(pd.picks,hist);
          D=tmpD2;
          wins=dp.wins;logged=dp.logged;
        }
        const label=d.slice(5);
        // Color intensity based on win rate: 9/10=bright green, 5/10=medium, 0/10=dark/red
        let bg,clr;
        if(logged===0){bg='var(--card2)';clr='var(--muted)';}
        else{
          const rate=wins/logged;
          if(rate>=0.7){bg='rgba(5,150,105,'+(0.3+rate*0.4)+')';clr='#fff';}
          else if(rate>=0.4){bg='rgba(5,150,105,'+(0.1+rate*0.3)+')';clr='var(--text)';}
          else if(rate>=0.2){bg='rgba(245,158,11,'+(0.15+rate*0.2)+')';clr='var(--text)';}
          else{bg='rgba(239,68,68,'+(0.15+(1-rate)*0.15)+')';clr='var(--text)';}
        }
        const summary=logged>0?wins+'W/'+logged:'—';
        return `<span class="tp-hist-day ${isActive?'active':''}" onclick="switchDay('${d}').catch(e=>console.error('switchDay error:',e))" style="background:${bg};color:${clr};border-color:${isActive?'var(--gold)':bg}" title="${d}: ${wins} wins from ${logged} logged picks">${label}<br><span style="font-size:10px;font-weight:400">${summary}</span></span>`;
      })).join('')}
    </div>`:''}
    ${insights.length?`<div class="tp-feedback">
      <div class="tp-feedback-title">Performance Insights${prevDate?' (vs '+prevDate.slice(5)+')':''}</div>
      ${insights.map(i=>`<div class="tp-insight">${i}</div>`).join('')}
    </div>`:''}
    ${(()=>{
      const calHist=getPicksCalibrationHistory();
      if(!calHist||!calHist.history||!calHist.history.length) return '';
      const latest=calHist.history[calHist.history.length-1];
      const adj=getPicksFactorAdjustments();
      if(!adj) return '';
      const boosted=Object.entries(adj).filter(([f,v])=>v>1.05).sort((a,b)=>b[1]-a[1]).slice(0,3);
      const dampened=Object.entries(adj).filter(([f,v])=>v<0.95).sort((a,b)=>a[1]-b[1]).slice(0,3);
      return `<div class="tp-auto-cal">
        <div class="tp-auto-cal-title">Daily Auto-Calibration (last: ${latest.date.slice(5)}, ${latest.wins}W/${latest.losses}L from ${latest.total} picks)</div>
        ${boosted.length?`<div class="tp-auto-cal-row"><span>Boosted:</span><b>${boosted.map(([f,v])=>f+' ×'+v.toFixed(2)).join(', ')}</b></div>`:''}
        ${dampened.length?`<div class="tp-auto-cal-row"><span>Dampened:</span><b>${dampened.map(([f,v])=>f+' ×'+v.toFixed(2)).join(', ')}</b></div>`:''}
        <div class="tp-auto-cal-row" style="margin-top:4px;font-size:11px;color:var(--muted)">Picks engine learns daily — adjustments apply live and carry to next day. May override raw #1 picks if feedback suggests a better horse. Overall UI weights are separate (50+ races to calibrate).</div>
      </div>`;
    })()}
  </div>`;
  updateStatus();
}

function renderVenueBar(){
  const venues=Object.keys(D.venues);
  document.getElementById('venueBar').innerHTML=
    `<button class="vbtn ${st.venue==='all'?'on':''}" onclick="filterVenue('all')">All (${venues.length})</button>`+
    venues.map(v=>`<button class="vbtn ${st.venue===v?'on':''}" onclick="filterVenue('${v}')">${D.venues[v].course} (${D.venues[v].race_count})</button>`).join('');
}

function filterVenue(v){st.venue=v;renderRaceCards()}

function renderRaceCards(){
  const el=document.getElementById('raceCards');
  let races=[];
  const venues=st.venue==='all'?Object.keys(D.venues):[st.venue];
  venues.forEach(vk=>{
    const v=D.venues[vk];if(!v)return;
    v.races.forEach((r,ri)=>{races.push({...r,venueKey:vk,raceIdx:ri})});
  });
  races.sort((a,b)=>a.time.localeCompare(b.time));

  const hist=window._resultsHistory;
  // Pre-compute today's combo matches keyed by venueKey+raceIdx for O(1) lookup
  const comboData=buildComboDatabase();
  const todayCombos=findTodayCombos(comboData);
  const comboByRace={};
  todayCombos.forEach(m=>{
    const k=m.venueKey+'_'+m.raceIdx;
    if(!comboByRace[k]) comboByRace[k]=[];
    comboByRace[k].push(m);
  });

  el.innerHTML=races.map(r=>{
    const top=r.runners&&r.runners[0];
    const topConf=top?top.confidence:'';
    const topScore=top?top.score:0;
    const cardId=`raceCard_${r.venueKey}_${r.raceIdx}`;
    const dupKey=(D.date||'')+r.venueKey+r.time;
    const logged=hist&&hist.races&&hist.races.some(h=>(h.date+h.venue+h.time)===dupKey);
    const rCombos=comboByRace[r.venueKey+'_'+r.raceIdx]||[];
    return `<div class="rc" id="${cardId}" onclick="openRace('${r.venueKey}',${r.raceIdx}).catch(e=>console.error('openRace error:',e))">
      ${logged?'<span class="rc-logged">✓ LOGGED</span>':''}
      <div class="rc-head"><span class="venue">${r.course}</span><span class="time">${r.time}</span></div>
      <div class="rmeta">
        <span>${r.distance}</span><span>${r.going}</span><span>${r.race_type}</span>
        <span>${r.field_size} runners</span>
        ${r.race_class?`<span>Class ${r.race_class}</span>`:''}
        ${r.pattern?`<span>${r.pattern}</span>`:''}
        ${r.handicap?'<span>HCP</span>':''}
      </div>
      ${top?(()=>{
        const sorted=[...r.runners].sort((a,b)=>b.score-a.score);
        const second=sorted[1];
        const gap=second?Math.round((top.score-second.score)*10)/10:0;
        const avg=r.runners.length?Math.round(r.runners.reduce((a,x)=>a+x.score,0)/r.runners.length):0;
        const spreadCls=gap>=15?'spread-high':gap>=8?'spread-mid':'spread-low';
        const spreadLabel=gap>=15?'CLEAR':gap>=8?'COMPETITIVE':'TIGHT';
        return `<div class="top-pick-preview">
        <span><span class="tpp-name">★ ${top.name}</span> <span style="color:var(--muted);font-size:11px">${top.trainer}</span></span>
        <span style="display:flex;align-items:center;gap:6px">
          ${confBadge(topConf)}
          <span style="font-weight:700;color:${sc(topScore)}">${topScore}/${MAX_SCORE}</span>
        </span>
      </div>
      <div class="rc-spread">
        <span class="rc-spread-label">Spread:</span><span class="rc-spread-val ${spreadCls}">${spreadLabel} (${gap>0?'+':''}${gap})</span>
        <span class="rc-spread-label" style="margin-left:auto">Avg:</span><span style="font-weight:600;color:var(--muted)">${avg}</span>
        ${second?`<span class="rc-spread-label">2nd:</span><span style="font-weight:600;color:${sc(second.score)}">${second.name.split(' ')[0]} ${second.score}</span>`:''}
      </div>`;
      })():'<div class="top-pick-preview" style="color:var(--muted)">Click to analyze runners</div>'}
      ${rCombos.length?`<div style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px;display:flex;flex-wrap:wrap;gap:4px">${rCombos.map(m=>{
        const pr=Math.round(m.combo.placeRate);const wr=Math.round(m.combo.winRate);
        const col=pr>=60?'#059669':pr>=40?'#f59e0b':'#6b7280';
        return `<div style="display:inline-flex;align-items:center;gap:4px;background:${col}18;border:1px solid ${col}44;border-radius:5px;padding:2px 8px;font-size:10px">
          <span style="color:${col};font-weight:700">⚡ COMBO</span>
          <span style="color:var(--fg);font-weight:600">${m.runner.name}</span>
          <span style="color:var(--muted)">·</span>
          <span style="color:var(--muted)">${m.combo.type.replace('+',' + ')}</span>
          <span style="color:var(--muted)">·</span>
          <span style="color:${col};font-weight:600">${pr}% placed</span>
          <span style="color:var(--muted)">(${m.combo.total} runs)</span>
        </div>`;
      }).join('')}</div>`:''}
      ${buildRaceBrief(r, rCombos)}
    </div>`;
  }).join('');
}

async function openRace(vk,ri){st.openRace={vk,ri};st.expanded=null;st.detailTab='main';st.h2hPair=null;await render()}
async function goBack(){st.openRace=null;await render()}
function switchDetailTab(tab){st.detailTab=tab;st.h2hPair=null;renderDetail().catch(e=>console.error('renderDetail error:',e));}

async function renderDetail(){
  const {vk,ri}=st.openRace;
  const venue=D.venues[vk];if(!venue)return;
  const race=venue.races[ri];if(!race)return;
  const el=document.getElementById('detailContent');

  let runners=[...race.runners];
  runners.sort((a,b)=>{
    let va,vb;
    if(st.sort==='score'){va=a.score;vb=b.score}
    else if(st.sort==='number'){va=a.number||0;vb=b.number||0}
    else if(st.sort==='age'){va=a.age||0;vb=b.age||0}
    else if(st.sort==='weight'){va=a.lbs||0;vb=b.lbs||0}
    else if(st.sort==='rpr'){va=a.rpr||0;vb=b.rpr||0}
    else if(st.sort==='form'){va=(a.score_breakdown?.form)||0;vb=(b.score_breakdown?.form)||0}
    else{va=a.score;vb=b.score}
    return st.sortDir*(vb-va);
  });

  const topPicks=runners.filter(r=>(r.confidence||'')==='TOP PICK').length;
  const strong=runners.filter(r=>(r.confidence||'')==='STRONG').length;
  const avgScore=runners.length?Math.round(runners.reduce((a,r)=>a+r.score,0)/runners.length):0;
  const tab=st.detailTab||'main';

  // Header (shared between tabs)
  let html=`
  <div class="race-title">${race.time} — ${race.name}</div>
  <div class="race-sub">
    <span>${race.course}</span><span>${race.distance}</span><span>${race.going}</span>
    <span>${race.race_type}</span><span>${race.field_size} runners</span>
    ${race.race_class?`<span>Class ${race.race_class}</span>`:''}
    ${race.pattern?`<span>${race.pattern}</span>`:''}
    ${race.handicap?'<span>Handicap</span>':''}
    ${race.prize?`<span>Prize: £${race.prize}</span>`:''}
  </div>
  <div class="sumstrip">
    <div class="ss"><div class="sv">${runners.length}</div><div class="sl">Runners</div></div>
    <div class="ss"><div class="sv" style="color:#059669">${topPicks}</div><div class="sl">Top Picks</div></div>
    <div class="ss"><div class="sv" style="color:#0d9488">${strong}</div><div class="sl">Strong</div></div>
    <div class="ss"><div class="sv">${avgScore}</div><div class="sl">Avg Score</div></div>
  </div>
  <div class="detail-tabs">
    <button class="dtab ${tab==='main'?'active':''}" onclick="switchDetailTab('main')">MAIN</button>
    <button class="dtab ${tab==='deepdive'?'active':''}" onclick="switchDetailTab('deepdive')">DEEP DIVE</button>
  </div>`;

  if(tab==='main'){
    html+=renderMainTab(runners,race,vk,ri);
  }else{
    html+=renderDeepDiveTab(runners,race);
  }
  el.innerHTML=html;
}

function renderMainTab(runners,race,vk,ri){
  const avgScore=runners.length?runners.reduce((a,r)=>a+r.score,0)/runners.length:0;
  function deltaHtml(score){
    const d=score-avgScore;
    const rd=Math.round(d*10)/10;
    if(rd>0) return `<span class="sd-pos">+${rd}</span>`;
    if(rd<0) return `<span class="sd-neg">${rd}</span>`;
    return `<span class="sd-even">±0</span>`;
  }
  let h=`
  <div class="var-check-legend">
    <div class="vcl-item"><span class="vcl-dot" style="background:#059669"></span>Pass (≥70%)</div>
    <div class="vcl-item"><span class="vcl-dot" style="background:#d97706"></span>Marginal (40-69%)</div>
    <div class="vcl-item"><span class="vcl-dot" style="background:#dc2626"></span>Fail (&lt;40%)</div>
    <span style="margin-left:auto;font-size:11px;color:var(--muted)">Avg: ${Math.round(avgScore)}/${MAX_SCORE} · Variables: ${Object.values(FM).map(f=>f.l).join(' · ')}</span>
  </div>
  <table class="rtbl"><thead><tr>
    ${thSort('#','number')}${thSort('Horse','score')}${thSort('Form','form')}
    ${thSort('Age','age')}${thSort('RPR','rpr')}
    ${thSort('Wt','weight')}
    <th>Dr</th><th>Last</th>
    ${thSort('Score','score')}<th>vs Avg</th>
    <th>Confidence</th><th>Variable Check</th>
  </tr></thead><tbody>
  ${runners.map((r,i)=>{
    const conf=r.confidence||'MODERATE';
    const rowCl=conf==='TOP PICK'?'top-pick-row':conf==='STRONG'?'strong-row':'';
    const isExp=st.expanded===r.name;
    let rows=`<tr class="${rowCl} expandable" onclick="toggleExp('${r.name.replace(/'/g,"\\'")}')">
      <td style="font-weight:700;color:var(--muted)">${r.number||'—'}</td>
      <td><div style="font-weight:700;font-size:14px">${r.name}</div><div style="font-size:11px;color:var(--muted)">${r.jockey||'?'} · ${r.trainer||'?'}</div></td>
      <td>${formHtml(r.form)}${(()=>{const m=calcMomentum(r.form);return m.label!=='UNKNOWN'?` <span class="mom ${m.cls}" title="${m.tip}" style="padding:1px 4px;font-size:8px;vertical-align:middle">${m.icon}</span>`:'';})()}</td>
      <td style="font-weight:600">${r.age||'?'}</td>
      <td style="font-weight:600">${r.rpr||'—'}</td>
      <td>${wtStr(r.lbs)}</td>
      <td>${r.draw||'—'}</td>
      <td>${r.last_run!=null?r.last_run+'d':'—'}</td>
      <td><span class="sbar"><span class="sfill" style="width:${(r.score/MAX_SCORE)*100}%;background:${sc(r.score)}"></span></span><b style="color:${sc(r.score)}">${r.score}</b><span style="color:var(--muted);font-size:10px">/${MAX_SCORE}</span></td>
      <td>${deltaHtml(r.score)}</td>
      <td>${confBadge(conf)}</td>
      <td>${varTicks(r.score_breakdown)}</td>
    </tr>`;
    if(isExp) rows+=renderExpandedRow(r, race.field_size||runners.length, race);
    return rows;
  }).join('')}
  </tbody></table>`;
  // Inline results logger
  h+=renderResultsLogger(vk,ri);
  return h;
}

/* ==================== DEEP DIVE TAB ==================== */
function renderDeepDiveTab(runners,race){
  const sorted=[...runners].sort((a,b)=>b.score-a.score);
  const top6=sorted.slice(0,Math.min(6,sorted.length));

  // === VERDICT PANEL ===
  let verdict='<div class="verdict-panel"><div class="verdict-title">Race Verdict</div>';

  // Pace analysis — look at form patterns for front-runners vs hold-up
  const paceRunners=sorted.filter(r=>{
    const f=(r.form||'').split('').slice(0,3);
    return f.filter(c=>'12'.includes(c)).length>=2;
  });
  const holdUp=sorted.filter(r=>{
    const f=(r.form||'').split('').slice(0,3);
    return f.filter(c=>'456789'.includes(c)).length>=2;
  });
  verdict+=`<div class="verdict-section"><div class="verdict-label">Pace Scenario</div><div class="verdict-text">`;
  if(paceRunners.length>=3) verdict+=`<span class="verdict-highlight vh-red">STRONG PACE</span> ${paceRunners.length} proven front-runners (${paceRunners.slice(0,3).map(r=>r.name).join(', ')}) — likely suits hold-up horses.`;
  else if(paceRunners.length>=2) verdict+=`<span class="verdict-highlight vh-amber">FAIR PACE</span> ${paceRunners.length} pace-setters (${paceRunners.map(r=>r.name).join(', ')}) should ensure a genuine gallop.`;
  else if(paceRunners.length===1) verdict+=`<span class="verdict-highlight vh-amber">STEADY PACE</span> Only ${paceRunners[0].name} likely to lead — could control the tempo.`;
  else verdict+=`<span class="verdict-highlight vh-green">MUDDLING PACE</span> No clear front-runner — could develop into a sprint finish.`;
  verdict+=`</div></div>`;

  // Key matchups — top 3
  if(sorted.length>=2){
    verdict+=`<div class="verdict-section"><div class="verdict-label">Key Matchups</div><div class="verdict-text">`;
    const r1=sorted[0],r2=sorted[1],r3=sorted[2];
    const bd1=r1.score_breakdown||{},bd2=r2.score_breakdown||{};
    // Find biggest edges
    let r1edges=[],r2edges=[];
    Object.entries(FM).forEach(([k,m])=>{
      const diff=(bd1[k]||0)-(bd2[k]||0);
      if(diff>=m.mx*0.3) r1edges.push(m.l);
      if(diff<=-m.mx*0.3) r2edges.push(m.l);
    });
    verdict+=`<b>${r1.name}</b> (${r1.score}) vs <b>${r2.name}</b> (${r2.score}): `;
    if(r1edges.length) verdict+=`${r1.name} has the edge on <span class="verdict-highlight vh-green">${r1edges.join('</span><span class="verdict-highlight vh-green">')}</span>. `;
    if(r2edges.length) verdict+=`${r2.name} fights back on <span class="verdict-highlight vh-amber">${r2edges.join('</span><span class="verdict-highlight vh-amber">')}</span>. `;
    if(!r1edges.length&&!r2edges.length) verdict+=`Very closely matched across all factors. `;
    if(r3){
      const bd3=r3.score_breakdown||{};
      let r3edges=[];
      Object.entries(FM).forEach(([k,m])=>{
        if((bd3[k]||0)>=m.mx*0.75) r3edges.push(m.l);
      });
      verdict+=`<b>${r3.name}</b> (${r3.score}) is the third force${r3edges.length?' with strong '+r3edges.slice(0,2).join(' and '):''}.`;
    }
    verdict+=`</div></div>`;
  }

  // Danger horse — highest outside top 2 with a standout factor
  if(sorted.length>=3){
    let danger=null,dangerReason='';
    for(let i=2;i<sorted.length;i++){
      const r=sorted[i],bd=r.score_breakdown||{};
      const strengths=[];
      Object.entries(FM).forEach(([k,m])=>{
        if((bd[k]||0)>=m.mx*0.85) strengths.push(m.l);
      });
      if(strengths.length>=3){danger=r;dangerReason=strengths.slice(0,3).join(', ');break;}
    }
    if(danger){
      verdict+=`<div class="verdict-section"><div class="verdict-label">Danger Horse</div><div class="verdict-text">`;
      verdict+=`<span class="verdict-highlight vh-red">⚠ ${danger.name}</span> (${danger.score}/${MAX_SCORE}) — scores near-max on ${dangerReason}. At a price, could outrun their position.`;
      verdict+=`</div></div>`;
    }
  }

  // Overall verdict
  verdict+=`<div class="verdict-section"><div class="verdict-label">Verdict</div><div class="verdict-text" style="font-weight:600">`;
  const gap=sorted.length>=2?sorted[0].score-sorted[1].score:0;
  if(gap>=15) verdict+=`<span class="verdict-highlight vh-green">${sorted[0].name}</span> looks the clear standout, ${gap} points clear of the field. The one to beat.`;
  else if(gap>=8) verdict+=`<span class="verdict-highlight vh-green">${sorted[0].name}</span> holds a solid advantage but <span class="verdict-highlight vh-amber">${sorted[1].name}</span> is the main danger. Competitive race.`;
  else if(sorted.length>=2) verdict+=`Tight at the top — <span class="verdict-highlight vh-amber">${sorted[0].name}</span> and <span class="verdict-highlight vh-amber">${sorted[1].name}</span> separated by just ${gap} points. Difficult to split.`;
  else verdict+=`Small field — ${sorted[0]?.name||'?'} the likely favourite.`;
  verdict+=`</div></div></div>`;

  // === HEAD-TO-HEAD MATRIX ===
  let matrix=`<div class="h2h-wrap"><div class="h2h-title">Head-to-Head Matrix — Factor Advantage Count (top ${top6.length})</div>`;
  matrix+=`<table class="h2h-table"><thead><tr><th style="text-align:left">↓ vs →</th>`;
  top6.forEach(r=>{matrix+=`<th title="${r.name}">${r.name.length>10?r.name.slice(0,9)+'…':r.name}</th>`;});
  matrix+=`</tr></thead><tbody>`;

  top6.forEach((r1,i)=>{
    matrix+=`<tr><th style="text-align:left;font-weight:700;color:var(--text)">${r1.name.length>10?r1.name.slice(0,9)+'…':r1.name}</th>`;
    top6.forEach((r2,j)=>{
      if(i===j){matrix+=`<td class="h2h-self">—</td>`;return;}
      const bd1=r1.score_breakdown||{},bd2=r2.score_breakdown||{};
      let wins=0,total=Object.keys(FM).length;
      Object.keys(FM).forEach(k=>{if((bd1[k]||0)>(bd2[k]||0))wins++;});
      const cls=wins>total/2+2?'h2h-cell-win':wins>=total/2-1?'h2h-cell-even':'h2h-cell-lose';
      const esc1=r1.name.replace(/'/g,"\\'"),esc2=r2.name.replace(/'/g,"\\'");
      matrix+=`<td class="${cls}" onclick="showH2HDetail('${esc1}','${esc2}')" title="${r1.name} beats ${r2.name} on ${wins}/${total} factors">${wins}/${total}</td>`;
    });
    matrix+=`</tr>`;
  });
  matrix+=`</tbody></table>`;
  matrix+=`<div style="font-size:11px;color:var(--muted);margin-top:6px">Click any cell to see the factor-by-factor breakdown</div>`;
  matrix+=`<div id="h2hDetailBox"></div></div>`;

  // === BETTING SIGNAL PANEL ===
  const bettingSignal=renderBettingSignal(runners,race);

  return verdict+matrix+bettingSignal;
}

function showH2HDetail(name1,name2){
  if(!st.openRace)return;
  const {vk,ri}=st.openRace;
  const race=D.venues[vk].races[ri];
  const r1=race.runners.find(r=>r.name===name1);
  const r2=race.runners.find(r=>r.name===name2);
  if(!r1||!r2)return;
  const bd1=r1.score_breakdown||{},bd2=r2.score_breakdown||{};
  let wins1=0,wins2=0,draws=0;
  let factorsHtml='';
  Object.entries(FM).forEach(([k,m])=>{
    const v1=bd1[k]||0,v2=bd2[k]||0;
    let cls='h2h-factor-draw',arrow='=';
    if(v1>v2){wins1++;cls='h2h-factor-win';arrow='▲';}
    else if(v2>v1){wins2++;cls='h2h-factor-lose';arrow='▼';}
    else{draws++;}
    factorsHtml+=`<div class="h2h-factor"><span>${m.l}</span><span class="${cls}">${v1} ${arrow} ${v2}</span></div>`;
  });
  const box=document.getElementById('h2hDetailBox');
  if(box) box.innerHTML=`<div class="h2h-detail">
    <div style="font-weight:700;font-size:14px;margin-bottom:4px"><span style="color:var(--accent)">${name1}</span> (${r1.score}) vs <span style="color:var(--accent2)">${name2}</span> (${r2.score})</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${name1} wins ${wins1} factors · ${name2} wins ${wins2} · ${draws} tied</div>
    <div class="h2h-detail-grid">${factorsHtml}</div>
  </div>`;
}

function thSort(label,key){

  return `<th onclick="doSort('${key}')" style="${isActive?'color:var(--accent)':''}">${label} ${arrow}</th>`;
}

function doSort(key){
  if(st.sort===key)st.sortDir*=-1;
  else{st.sort=key;st.sortDir=-1}
  renderDetail();
}

function toggleExp(name){st.expanded=st.expanded===name?null:name;renderDetail().catch(e=>console.error('renderDetail error:',e))}

function renderExpandedRow(r, fieldSize, race){
  const bd=r.score_breakdown||{};
  const fs=fieldSize||12;
  // Dynamic Top N: only show positions that make sense for this field size
  // e.g. 6-runner race → Top 1,2,3,4,5,6 (no Top 8 or Top 10)
  const topNs=[];
  for(let i=1;i<=Math.min(fs,6);i++) topNs.push(i);
  if(fs>6 && fs<=10) topNs.push(fs);
  if(fs>10){topNs.push(8);topNs.push(10);if(fs>10)topNs.push(fs);}
  // Recalculate probabilities client-side based on actual field size
  function calcProb(score,topN,fSize){
    const n=score/MAX_SCORE;
    const bl=Math.min(topN/fSize,1);
    const sk=Math.pow(n,2);
    return Math.min(Math.max(Math.round((bl+sk*(1-bl)*0.75)*100),5),95);
  }
  // Grid columns adapt to number of Top N values
  const cols=topNs.length<=4?topNs.length:Math.min(topNs.length,4);
  return `<tr class="exp-row"><td colspan="12"><div class="exp-inner">
    <div>
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--accent)">Factor Breakdown</div>
      <div class="exp-factors">
        ${Object.entries(FM).map(([k,m])=>{
          const v=bd[k]||0,pct=(v/m.mx)*100;
          const col=pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444';
          return `<div class="ef"><div class="efl">${m.l}</div><div class="efv" style="color:${col}">${v}</div><div class="efm">/ ${m.mx}</div><div class="efbar"><div class="efbar-f" style="width:${pct}%;background:${col}"></div></div></div>`;
        }).join('')}
      </div>
    </div>
    ${race?renderCDPSection(r,race):''}
    <div>
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--accent)">Top N Finish Probability <span style="font-weight:400;font-size:11px;color:var(--muted)">(${fs}-runner field)</span></div>
      <div class="exp-probs" style="grid-template-columns:repeat(${cols},1fr)">
        ${topNs.map(n=>{
          const p=calcProb(r.score,n,fs);
          const label=n===1?'Win':n===fs?'Finish':('Top '+n);
          return `<div class="ep"><div class="epl">${label}</div><div class="epv" style="color:${pc(p)}">${p}%</div></div>`;
        }).join('')}
      </div>
      <div style="margin-top:10px;font-size:12px;color:var(--muted)">
        <b>Owner:</b> ${r.owner||'?'} · <b>Headgear:</b> ${r.headgear||'None'}${r.headgear_first?' (FIRST TIME)':''} · <b>Claim:</b> ${r.jockey_allowance?r.jockey_allowance+'lb':'None'}
      </div>
      ${(()=>{
        const mom=calcMomentum(r.form);
        if(mom.label==='UNKNOWN') return '';
        return '<div style="margin-top:10px;display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:12px;font-weight:700;color:var(--muted)">Form Momentum:</span>' +
          '<span class="mom '+mom.cls+'" title="'+mom.tip+'">'+mom.icon+' '+mom.label+'</span>' +
          (mom.label==='RISING'?'<span style="font-size:10px;color:var(--muted)">Avg recent pos: '+mom.avgRecent+'</span>':'') +
          (mom.label==='FALLING'?'<span style="font-size:10px;color:var(--muted)">Avg recent pos: '+mom.avgRecent+'</span>':'') +
          '</div>';
      })()}
    </div>
    ${r.spotlight?`<div class="spot-box"><b>Spotlight:</b> ${r.spotlight}</div>`:''}
    ${r.comment?`<div class="spot-box" style="border-left-color:var(--warn)"><b>Comment:</b> ${r.comment}</div>`:''}
  </div></td></tr>`;
}

/* ==================== COMBINATION TRACKING ENGINE ==================== */
// Tracks horse/jockey, horse/trainer, jockey/trainer, horse/jockey/trainer combos
// across all logged results. Identifies high hit-rate patterns (>80%).

function getCombosStorageKey(){return 'comboTracker'}
function loadCombos(){try{const r=localStorage.getItem(getCombosStorageKey());return r?JSON.parse(r):null;}catch(e){return null}}
function saveCombos(data){try{localStorage.setItem(getCombosStorageKey(),JSON.stringify(data));}catch(e){}}

function buildComboDatabase(){
  // Scan ALL logged results across all dates and build combination stats
  const hist=window._resultsHistory;
  if(!hist||!hist.races||!hist.races.length) return null;
  const combos={};// key -> {type,parts,runs:[{date,venue,time,horse,jockey,trainer,fp,fs,won,placed}]}

  hist.races.forEach(race=>{
    const date=race.date,venue=race.venue,time=race.time;
    const fs=race.field_size||race.results.length;
    race.results.forEach(r=>{
      if(r.non_runner||r.pull_out||!r.finish_pos) return;
      const h=(r.name||'').trim(), j=(r.jockey||'').trim(), t=(r.trainer||'').trim();
      const fp=r.finish_pos, won=fp===1, placed=fp<=getPlaceLimit(fs);
      const entry={date,venue,time,horse:h,jockey:j,trainer:t,fp,fs,won,placed};

      // Horse+Jockey
      if(h&&j){
        const k='HJ:'+h+'|'+j;
        if(!combos[k]) combos[k]={type:'Horse+Jockey',horse:h,jockey:j,trainer:'',runs:[]};
        combos[k].runs.push(entry);
      }
      // Horse+Trainer
      if(h&&t){
        const k='HT:'+h+'|'+t;
        if(!combos[k]) combos[k]={type:'Horse+Trainer',horse:h,jockey:'',trainer:t,runs:[]};
        combos[k].runs.push(entry);
      }
      // Jockey+Trainer
      if(j&&t){
        const k='JT:'+j+'|'+t;
        if(!combos[k]) combos[k]={type:'Jockey+Trainer',horse:'',jockey:j,trainer:t,runs:[]};
        combos[k].runs.push(entry);
      }
      // Horse+Jockey+Trainer (triple)
      if(h&&j&&t){
        const k='HJT:'+h+'|'+j+'|'+t;
        if(!combos[k]) combos[k]={type:'Horse+Jockey+Trainer',horse:h,jockey:j,trainer:t,runs:[]};
        combos[k].runs.push(entry);
      }
    });
  });

  // Calculate stats for each combo
  const analyzed=[];
  Object.entries(combos).forEach(([key,c])=>{
    if(c.runs.length<2) return; // need at least 2 appearances
    const total=c.runs.length;
    const wins=c.runs.filter(r=>r.won).length;
    const places=c.runs.filter(r=>r.placed).length;
    const winRate=Math.round(wins/total*100);
    const placeRate=Math.round(places/total*100);
    const lastRun=c.runs.sort((a,b)=>b.date.localeCompare(a.date))[0];
    analyzed.push({
      key,type:c.type,horse:c.horse,jockey:c.jockey,trainer:c.trainer,
      total,wins,places,winRate,placeRate,
      lastDate:lastRun.date,lastVenue:lastRun.venue,
      runs:c.runs.sort((a,b)=>a.date.localeCompare(b.date)),
      isHot:placeRate>=80&&total>=2
    });
  });

  analyzed.sort((a,b)=>(b.isHot?1:0)-(a.isHot?1:0)||b.placeRate-a.placeRate||b.total-a.total);
  const result={updatedAt:new Date().toISOString(),combos:analyzed};
  saveCombos(result);
  return result;
}

function findTodayCombos(comboData){
  // Scan today's loaded data for runners matching hot combos
  if(!D||!D.venues||!comboData||!comboData.combos) return [];
  const hotCombos=comboData.combos.filter(c=>c.isHot);
  if(!hotCombos.length) return [];

  const matches=[];
  Object.entries(D.venues).forEach(([vk,venue])=>{
    venue.races.forEach((race,ri)=>{
      if(!race.runners) return;
      race.runners.forEach(runner=>{
        const h=(runner.name||'').trim(), j=(runner.jockey||'').trim(), t=(runner.trainer||'').trim();
        hotCombos.forEach(combo=>{
          let match=false;
          if(combo.type==='Horse+Jockey+Trainer'&&combo.horse===h&&combo.jockey===j&&combo.trainer===t) match=true;
          else if(combo.type==='Horse+Jockey'&&combo.horse===h&&combo.jockey===j) match=true;
          else if(combo.type==='Horse+Trainer'&&combo.horse===h&&combo.trainer===t) match=true;
          else if(combo.type==='Jockey+Trainer'&&combo.jockey===j&&combo.trainer===t) match=true;
          if(match){
            matches.push({
              combo,runner,race,venue:venue.course,venueKey:vk,raceIdx:ri,
              time:race.time,score:runner.score,confidence:runner.confidence
            });
          }
        });
      });
    });
  });
  // Deduplicate: one runner can match multiple combo types — keep the strongest
  const seen=new Set();
  const deduped=[];
  matches.sort((a,b)=>b.combo.placeRate-a.combo.placeRate||b.combo.total-a.combo.total);
  matches.forEach(m=>{
    const uid=m.venueKey+m.time+m.runner.name;
    if(!seen.has(uid)){seen.add(uid);deduped.push(m);}
  });
  return deduped;
}

/* ==================== TRENDS DASHBOARD ==================== */
function renderTrends(){
  const el=document.getElementById('trendsContent');
  const hist=window._resultsHistory;
  if(!hist||!hist.races||!hist.races.length){
    el.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--muted)"><h2 style="color:var(--text);margin-bottom:8px">No History Data Yet</h2><p>Log race results to start tracking trends. The dashboard will populate as data builds up.</p></div>';
    return;
  }

  // Flatten race-level history into runner-level picks (only top pick per race)
  // Each hist.races[] entry is a RACE containing .results[] array of runners
  const raceEntries=hist.races;
  const totalRacesLogged=raceEntries.length;
  let totalPicks=0, totalWins=0, totalPlaces=0;
  const byDate={};
  const bySurface={aw:{total:0,wins:0,places:0},nh:{total:0,wins:0,places:0},turf_flat:{total:0,wins:0,places:0}};

  raceEntries.forEach(race=>{
    if(!race.results||!race.results.length) return;
    const fs=race.field_size||race.results.length;
    const pl=getPlaceLimit(fs);
    const profile=race.profile||'turf_flat';
    const date=race.date||'';

    // Find the top predicted pick (highest predicted_score)
    const validRunners=race.results.filter(r=>r.finish_pos&&!r.non_runner&&!r.pull_out);
    if(!validRunners.length) return;
    const topPick=validRunners.reduce((best,r)=>(r.predicted_score||0)>(best.predicted_score||0)?r:best,validRunners[0]);
    if(!topPick||!topPick.finish_pos) return;

    totalPicks++;
    const isWin=topPick.finish_pos===1;
    const isPlaced=topPick.finish_pos<=pl;
    if(isWin) totalWins++;
    if(isPlaced) totalPlaces++;

    // By date
    if(date){
      if(!byDate[date]) byDate[date]={total:0,wins:0,places:0};
      byDate[date].total++;
      if(isWin) byDate[date].wins++;
      if(isPlaced) byDate[date].places++;
    }

    // By surface
    if(!bySurface[profile]) bySurface[profile]={total:0,wins:0,places:0};
    bySurface[profile].total++;
    if(isWin) bySurface[profile].wins++;
    if(isPlaced) bySurface[profile].places++;
  });

  const winRate=totalPicks?Math.round(totalWins/totalPicks*100):0;
  const placeRate=totalPicks?Math.round(totalPlaces/totalPicks*100):0;
  const ver=getAnalysisVersion().toFixed(1);
  const calibrations=hist.calibrations||[];

  const dates=Object.keys(byDate).sort().slice(-14);
  const uniqueDays=Object.keys(byDate).length;

  // 7-day comparison
  const last7=dates.slice(-7);
  const prev7=dates.slice(-14,-7);
  function periodRate(ds,key){
    let t=0,w=0;
    ds.forEach(d=>{if(byDate[d]){t+=byDate[d].total;w+=byDate[d][key];}});
    return t?Math.round(w/t*100):0;
  }
  const wr7=periodRate(last7,'wins'), wrPrev=periodRate(prev7,'wins');
  const pr7=periodRate(last7,'places'), prPrev=periodRate(prev7,'places');
  const wrDelta=wr7-wrPrev, prDelta=pr7-prPrev;
  const surfaceNames={aw:'All-Weather',nh:'National Hunt',turf_flat:'Turf Flat'};
  const surfaceColors={aw:'#10b981',nh:'#0d9488',turf_flat:'#3b82f6'};

  // Calibration version history — deduplicate by date (multi-profile entries group to one version)
  // and compute win rates retroactively from race data
  const appliedCals=calibrations.filter(c=>c.applied);
  const calByDate={};
  appliedCals.forEach(c=>{
    const d=c.date||'unknown';
    if(!calByDate[d]) calByDate[d]={date:d,profiles:[],old_weights:{},new_weights:{},correlations:c.correlations||{},races_used:0};
    calByDate[d].profiles.push(c.profile);
    calByDate[d].old_weights[c.profile]=c.old_weights||{};
    calByDate[d].new_weights[c.profile]=c.new_weights||{};
    calByDate[d].races_used=Math.max(calByDate[d].races_used,c.races_used||0);
    if(c.correlations) Object.assign(calByDate[d].correlations, c.correlations);
  });
  const calDates=Object.keys(calByDate).sort();
  // Assign version numbers: Prixm 1.0 = base, each calibration increments by 1.0
  calDates.forEach((d,i)=>{calByDate[d].version=(i+2).toFixed(1);});

  // Compute win rate for each calibration period
  // Calibration applied on date X means today's races were already analyzed with OLD weights.
  // So version X's performance = races logged on dates STRICTLY AFTER X until next cal date.
  // Base (Prixm 1.0) = races on dates UP TO AND INCLUDING the first cal date (those used old weights).
  const allDates=Object.keys(byDate).sort();
  function winRateForPeriod(afterDate,upToDate){
    // afterDate: exclusive start (only dates > afterDate). null = from beginning.
    // upToDate: inclusive end (dates <= upToDate). null = to end.
    let t=0,w=0;
    allDates.forEach(d=>{
      if(afterDate&&d<=afterDate) return;
      if(upToDate&&d>upToDate) return;
      t+=byDate[d].total;
      w+=byDate[d].wins;
    });
    return t?Math.round(w/t*100):null;
  }
  // Base period (Prixm 1.0): all races up to and including first cal date (analyzed with base weights)
  const baseWR=calDates.length?winRateForPeriod(null,calDates[0]):winRateForPeriod(null,null);
  // Each calibration period: races AFTER that cal date until next cal date (inclusive)
  // These are the races that were actually analyzed with the new weights
  calDates.forEach((d,i)=>{
    const nextD=calDates[i+1]||null;
    calByDate[d].win_rate=winRateForPeriod(d,nextD);
  });

  // Build enriched calEntries array with base + each calibration
  const calEntries=[{date:calDates[0]||allDates[0]||'Base',version:'1.0',win_rate:baseWR,is_base:true}];
  calDates.forEach(d=>{calEntries.push(calByDate[d]);});
  const calEntriesLast4=calEntries.slice(-4);

  // Weight changes for latest calibration
  if(calDates.length){
    const latestD=calDates[calDates.length-1];
    const latest=calByDate[latestD];
    const changes={};
    latest.profiles.forEach(p=>{
      const oldW=latest.old_weights[p]||{};
      const newW=latest.new_weights[p]||{};
      Object.keys(newW).forEach(f=>{
        const diff=Math.round(((newW[f]||0)-(oldW[f]||0))*10)/10;
        if(diff!==0) changes[f]=(changes[f]||0)+diff;
      });
    });
    latest.changes=changes;
  }

  // Factor correlation from latest calibration (use stored or recompute label)
  let factorDrift='';
  const latestWithCorrs=calDates.length?calByDate[calDates[calDates.length-1]]:null;
  if(latestWithCorrs&&Object.keys(latestWithCorrs.correlations||{}).length){
    const corrs=latestWithCorrs.correlations;
    const sortedF=Object.entries(corrs).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1])).slice(0,5);
    factorDrift=sortedF.map(([f,rho])=>{
      const col=rho>0?'var(--accent)':'#ef4444';
      const barW=Math.max(Math.round(Math.abs(rho)*100),8);
      return `<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px">
        <span style="width:60px;font-weight:600">${(FM[f]&&FM[f].l)||f}</span>
        <div style="flex:1;height:20px;background:var(--card2);border-radius:4px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${col};border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700">${ENGINE_NAME} ${latestWithCorrs.version}</div>
        </div>
        <span style="color:${col};font-weight:700;width:36px;text-align:right">ρ ${rho.toFixed(2)}</span>
      </div>`;
    }).join('');
  }

  // Build chart bars for daily win/place rates
  const maxRate=100;
  const chartBars=dates.map(d=>{
    const day=byDate[d];
    const wr=day.total?Math.round(day.wins/day.total*100):0;
    const pr=day.total?Math.round(day.places/day.total*100):0;
    const h=Math.max(pr*1.3,20);
    const winH=wr*1.3;
    const dateLabel=d.slice(5); // MM-DD
    // Check if a calibration happened on this date
    const cal=calByDate[d];
    const calMark=cal?`style="color:#f97316"`:`style="color:var(--muted)"`;
    const calLabel=cal?ENGINE_NAME+' '+(cal.version||'?'):dateLabel;
    const border=cal?'border-left:1px dashed rgba(249,115,22,.3);':'';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;${border}">
      <div style="width:100%;height:${h}px;background:rgba(16,185,129,.15);border-radius:3px 3px 0 0;position:relative">
        <div style="position:absolute;bottom:0;width:100%;height:${winH}px;background:var(--accent);border-radius:3px 3px 0 0"></div>
      </div>
      <span style="font-size:8px;" ${calMark}>${calLabel}</span>
    </div>`;
  }).join('');

  // Build calibration timeline
  let timeline='';
  if(calEntriesLast4.length){
    timeline=`<div class="trends-timeline"><div class="trends-timeline-line"></div>${calEntriesLast4.map((c,i)=>{
      const isLatest=i===calEntriesLast4.length-1&&!c.is_base;
      const dotColor=c.is_base?'var(--muted)':isLatest?'var(--accent)':'#f97316';
      const glow=isLatest?'box-shadow:0 0 8px rgba(16,185,129,.5)':'';
      const vLabel=ENGINE_NAME+' '+(c.version||'1.0');
      const wr=c.win_rate!=null?c.win_rate+'%':'—';
      const wrCol=c.win_rate!=null&&c.win_rate>=25?'#34d399':c.win_rate!=null?'#fca5a5':'var(--muted)';
      return `<div class="trends-timeline-node">
        <div class="trends-timeline-dot" style="background:${dotColor};${glow}"></div>
        <div style="font-size:11px;font-weight:700;color:${dotColor}">${vLabel}</div>
        <div style="font-size:9px;color:var(--muted)">${c.is_base?'Base':c.date||'—'}</div>
        <div style="font-size:9px;color:${wrCol}">Win: ${wr}</div>
      </div>`;
    }).join('')}
    <div class="trends-timeline-node">
      <div class="trends-timeline-dot" style="background:var(--card2);border:2px dashed var(--muted)"></div>
      <div style="font-size:11px;font-weight:700;color:var(--muted)">Next</div>
      <div style="font-size:9px;color:var(--muted)">Pending</div>
    </div>
    </div>`;
    // Latest calibration detail box — show weight changes
    const latestCal=calDates.length?calByDate[calDates[calDates.length-1]]:null;
    if(latestCal&&latestCal.changes&&Object.keys(latestCal.changes).length){
      const changes=Object.entries(latestCal.changes).map(([f,delta])=>{
        const col=delta>0?'var(--accent)':'#ef4444';
        const sign=delta>0?'+':'';
        return `<span style="color:${col}">${delta>0?'↑':'↓'} ${(FM[f]&&FM[f].l)||f} ${sign}${Math.round(delta*10)/10}</span>`;
      }).join(' · ');
      timeline+=`<div class="trends-detail-box"><div style="font-weight:600;color:var(--text);margin-bottom:4px">${ENGINE_NAME} ${latestCal.version} Changes (${latestCal.date||'—'})</div>${changes}</div>`;
    }
  }

  // Surface breakdown HTML
  const surfaceHtml=Object.entries(bySurface).filter(([,v])=>v.total>0).map(([k,v])=>{
    const wr=Math.round(v.wins/v.total*100);
    const col=surfaceColors[k]||'var(--accent)';
    const trend=v.total>=20?(wr>=35?'↑ trending':wr>=25?'→ steady':'↓ struggling'):'Need more data';
    return `<div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="font-weight:600">${surfaceNames[k]||k}</span>
        <span style="color:${col};font-weight:700">${wr}%</span>
      </div>
      <div class="trends-surface-bar"><div class="trends-surface-fill" style="width:${wr}%;background:${col}"></div></div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px">${v.total} races · ${v.wins} wins · ${trend}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
  <h2 style="font-size:18px;color:var(--accent);margin-bottom:16px;font-weight:800">TRENDS DASHBOARD</h2>
  <div class="trends-kpi-row">
    <div class="trends-kpi">
      <div class="trends-kpi-val">${winRate}%</div>
      <div class="trends-kpi-label">Overall Win Rate</div>
      <div class="trends-kpi-delta ${wrDelta>=0?'up':'down'}">${wrDelta>=0?'↑':'↓'} ${wrDelta>=0?'+':''}${wrDelta}% vs prev 7d</div>
    </div>
    <div class="trends-kpi">
      <div class="trends-kpi-val">${placeRate}%</div>
      <div class="trends-kpi-label">Place Rate</div>
      <div class="trends-kpi-delta ${prDelta>=0?'up':'down'}">${prDelta>=0?'↑':'↓'} ${prDelta>=0?'+':''}${prDelta}%</div>
    </div>
    <div class="trends-kpi">
      <div class="trends-kpi-val" style="color:var(--warn)">${ENGINE_NAME} ${ver}</div>
      <div class="trends-kpi-label">Engine Version</div>
      <div class="trends-kpi-delta" style="color:var(--muted)">Calibrated ${calibrations.length}x</div>
    </div>
    <div class="trends-kpi">
      <div class="trends-kpi-val">${totalRacesLogged}</div>
      <div class="trends-kpi-label">Total Races Logged</div>
      <div class="trends-kpi-delta" style="color:var(--muted)">Across ${uniqueDays} days</div>
    </div>
  </div>

  <div class="trends-grid">
    <div class="trends-card" style="grid-column:1/3">
      <h4>Win Rate & Place Rate — Last 14 Days</h4>
      <div class="trends-chart" style="padding-bottom:24px">${chartBars}</div>
      <div class="trends-legend">
        <span><span class="trends-legend-dot" style="background:var(--accent)"></span>Win Rate</span>
        <span><span class="trends-legend-dot" style="background:rgba(16,185,129,.15)"></span>Place Rate</span>
        <span><span style="display:inline-block;width:2px;height:10px;border-left:2px dashed #f97316;margin-right:4px;vertical-align:middle"></span>Calibration Applied</span>
      </div>
    </div>

    <div class="trends-card">
      <h4>Win Rate by Surface</h4>
      ${surfaceHtml||'<div style="color:var(--muted);font-size:12px">No surface data yet</div>'}
    </div>

    <div class="trends-card">
      <h4>Factor Strength Over Time</h4>
      ${factorDrift||'<div style="color:var(--muted);font-size:12px">Run calibration to see factor correlation drift</div>'}
      ${factorDrift?'<div style="font-size:9px;color:var(--muted);margin-top:8px">Spearman ρ across calibration versions — higher = more predictive</div>':''}
    </div>

    <div class="trends-card" style="grid-column:1/3">
      <h4>Calibration History</h4>
      ${timeline||'<div style="color:var(--muted);font-size:12px">No calibrations yet — run calibration from the Performance tab after logging 50+ races</div>'}
    </div>
  </div>`;
}

  el.innerHTML=h;
  updateStatus();
}

function exportPDF(){
  if(!D||!D.venues){alert('No race data loaded');return;}
  const date=D.date||'';
  const dt=new Date(date+'T12:00:00');
  const dateLabel=dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const tR=Object.values(D.venues).reduce((a,v)=>a+v.races.length,0);

  // Collect all races sorted by time
  const races=[];

    venue.races.forEach((race,ri)=>{
      races.push({...race,venueKey:vk,venueName:venue.course,raceIdx:ri});
    });
  });
  races.sort((a,b)=>a.time.localeCompare(b.time));

  // Build HTML for print
  let html=races.map(race=>{
    const sorted=[...race.runners].sort((a,b)=>b.score-a.score).slice(0,5);
    const fs=race.field_size||race.runners.length;
    const rows=sorted.map((r,i)=>{
      const sp=r.score/MAX_SCORE*100;

      const cCol=conf==='TOP'?'#059669':conf==='STRONG'?'#0d9488':conf==='SOLID'?'#2563eb':conf==='MODERATE'?'#d97706':'#ef4444';

      const momStr=mom.label!=='UNKNOWN'?`<span style="color:${momCol}" title="${mom.label}">${mom.icon}</span>`:'<span style="color:#9ca3af">-</span>';
      const bet=getBetType(r,fs);
      const bCol=bet.type==='WIN'?'#059669':bet.type.includes('E/W')?'#2563eb':'#6b7280';
      const rankCol=i===0?'#059669':i===1?'#2563eb':'#111827';

        <td style="padding:4px 6px;font-weight:700;color:${sCol}">${r.score}/${MAX_SCORE}</td>
        <td style="padding:4px 6px;font-weight:600;font-size:10px;color:${cCol}">${conf}</td>
        <td style="padding:4px 6px;font-size:10px">${momStr}</td>
        <td style="padding:4px 6px;font-weight:700;font-size:10px;color:${bCol}">${bet.type}</td>
      </tr>`;

    return `<div class="race-block">
      <div class="race-hdr">
        <span class="race-time">${race.time} &nbsp; ${race.venueName.toUpperCase()}</span>
        <span class="race-meta">${race.distance} | ${race.going} | ${race.race_type} | Cl${race.race_class} | ${fs}r</span>
      </div>
      <table>
        <thead><tr>
          <th style="width:24px">#</th><th>Horse</th><th>Jockey / Trainer</th>
          <th style="width:50px">Form</th><th style="width:60px">Score</th>

        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  // Open print window

  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>Racing ${date}</title>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:#111827;padding:0;background:#fff}
