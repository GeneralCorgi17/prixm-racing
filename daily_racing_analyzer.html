<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Horse Racing Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--card:#111827;--card2:#1a2332;--accent:#10b981;--accent2:#3b82f6;--warn:#f59e0b;--danger:#ef4444;--text:#e5e7eb;--muted:#9ca3af;--border:#374151;--gold:#fbbf24}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.hdr{background:linear-gradient(135deg,#064e3b,#0f172a 50%,#312e81);padding:18px 28px;border-bottom:2px solid var(--accent);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:22px;font-weight:700;color:#fff}
.hdr-r{display:flex;gap:12px;align-items:center;font-size:13px}
.date-b{background:rgba(16,185,129,.15);color:var(--accent);padding:5px 14px;border-radius:20px;font-weight:700;font-size:13px}

/* Status bar — per-day data completeness */
.sb-wrap{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sb-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.sb-badge-ok{background:rgba(5,150,105,.2);color:#34d399}
.sb-badge-partial{background:rgba(245,158,11,.15);color:#fbbf24}
.sb-badge-none{background:rgba(156,163,175,.1);color:var(--muted)}
.sb-items{display:flex;gap:4px;flex-wrap:wrap}
.sb-item{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;display:inline-flex;align-items:center;gap:2px;white-space:nowrap}
.sb-ok{background:rgba(5,150,105,.15);color:#34d399}
.sb-warn{background:rgba(245,158,11,.12);color:#fbbf24}
.sb-off{background:rgba(156,163,175,.08);color:var(--muted)}

/* Landing: venue filter + race cards */
.landing{padding:20px 28px;max-width:1200px;margin:0 auto}
.venues-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.vbtn{padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;background:var(--card2);color:var(--muted);border:1px solid var(--border);transition:all .2s}
.vbtn:hover{border-color:var(--accent);color:var(--text)}
.vbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.race-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.rc{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:all .2s;position:relative}
.rc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.rc .rc-head{display:flex;justify-content:space-between;align-items:center}
.rc .time{font-size:18px;font-weight:700;color:var(--accent)}
.rc .venue{font-size:16px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.rc .rname{display:none}
.rc .rmeta{font-size:12px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.rc .rmeta span{background:var(--card2);padding:2px 8px;border-radius:3px}
.rc .top-pick-preview{margin-top:10px;padding:8px 10px;background:var(--card2);border-radius:6px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.rc .top-pick-preview .tpp-name{font-weight:700}

/* Race detail view */
.detail-view{padding:20px 28px;max-width:1400px;margin:0 auto;display:none}
.back-btn{background:none;border:1px solid var(--border);color:var(--accent);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;margin-bottom:16px;transition:all .2s}
.back-btn:hover{background:var(--accent);color:#fff}
.race-title{font-size:22px;font-weight:700;margin-bottom:4px}
.race-sub{font-size:13px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.race-sub span{background:var(--card);padding:4px 12px;border-radius:5px}

/* Variable check legend */
.var-check-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--muted)}
.vcl-item{display:flex;align-items:center;gap:4px}
.vcl-dot{width:10px;height:10px;border-radius:2px}

/* Runners table */
.rtbl{width:100%;border-collapse:collapse;font-size:13px}
.rtbl th{text-align:left;padding:10px 6px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:2;cursor:pointer;user-select:none}
.rtbl th:hover{color:var(--text)}
.rtbl td{padding:10px 6px;border-bottom:1px solid rgba(55,65,81,.3);vertical-align:middle}
.rtbl tr{transition:background .15s}
.rtbl tr:hover{background:rgba(255,255,255,.02)}
.rtbl tr.top-pick-row{background:rgba(5,150,105,.08)}
.rtbl tr.strong-row{background:rgba(13,148,136,.05)}
.rtbl tr.expandable{cursor:pointer}

/* Confidence badge */
.cb{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.cb-tp{background:rgba(5,150,105,.25);color:#34d399}
.cb-st{background:rgba(13,148,136,.2);color:#2dd4bf}
.cb-so{background:rgba(37,99,235,.2);color:#60a5fa}
.cb-mo{background:rgba(217,119,6,.2);color:#fbbf24}
.cb-wk{background:rgba(220,38,38,.2);color:#f87171}
.cb-av{background:rgba(127,29,29,.25);color:#fca5a5}

/* Score bar */
.sbar{width:70px;height:7px;background:var(--card2);border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}
.sfill{height:100%;border-radius:4px}

/* Form chars */
.fc{display:inline-flex;gap:2px}
.fch{width:17px;height:17px;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.f1{background:rgba(16,185,129,.3);color:#34d399}
.f2{background:rgba(59,130,246,.25);color:#60a5fa}
.f3{background:rgba(245,158,11,.2);color:#fbbf24}
.fok{background:rgba(156,163,175,.12);color:#9ca3af}
.fbad{background:rgba(239,68,68,.2);color:#f87171}

/* Variable tick grid */
.vtg{display:grid;grid-template-columns:repeat(14,1fr);gap:2px;min-width:240px}
.vt{width:100%;aspect-ratio:1;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;position:relative}
.vt-g{background:#059669}
.vt-y{background:#d97706}
.vt-r{background:#dc2626}
.vt[title]{cursor:help}

/* Expanded detail row */
.exp-row{background:var(--card);border-bottom:1px solid var(--border)}
.exp-row td{padding:0!important}
.exp-inner{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.exp-factors{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
.ef{background:var(--card2);border-radius:6px;padding:8px;text-align:center}
.ef .efl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.ef .efv{font-size:18px;font-weight:700;margin:2px 0}
.ef .efm{font-size:9px;color:var(--muted)}
.ef .efbar{height:3px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:4px;overflow:hidden}
.ef .efbar-f{height:100%;border-radius:2px}
.exp-probs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.ep{background:var(--card2);border-radius:6px;padding:6px;text-align:center}
.ep .epl{font-size:9px;color:var(--muted)}
.ep .epv{font-size:16px;font-weight:700}
.spot-box{background:var(--card2);border-radius:6px;padding:10px;font-size:12px;line-height:1.5;border-left:3px solid var(--accent2);grid-column:1/-1;margin-top:4px}

/* Summary strip */
.sumstrip{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.ss{background:var(--card);border-radius:8px;padding:10px 16px;text-align:center;border:1px solid var(--border);min-width:100px}
.ss .sv{font-size:22px;font-weight:700}
.ss .sl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* No data */
.nodata{text-align:center;padding:80px 20px;color:var(--muted)}
.nodata h2{color:var(--text);margin-bottom:10px}
.nodata code{background:var(--card2);padding:6px 12px;border-radius:4px;display:inline-block;margin:6px 0;font-size:12px}

/* Top 10 Picks */
.tp-section{margin-bottom:20px}
.tp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.tp-title{font-size:16px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.tp-title span{font-size:12px;color:var(--muted);font-weight:400}
/* Progress bar */
.tp-progress{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tp-progress-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;width:180px;background:var(--card2)}
.tp-progress-bar .seg-won{background:#10b981}
.tp-progress-bar .seg-placed{background:#3b82f6}
.tp-progress-bar .seg-lost{background:#ef4444}
.tp-progress-bar .seg-pending{background:var(--card2)}
.tp-progress-counts{display:flex;gap:10px;font-size:11px;font-weight:600}
.tp-progress-counts .ct-won{color:#34d399}
.tp-progress-counts .ct-placed{color:#60a5fa}
.tp-progress-counts .ct-lost{color:#f87171}
.tp-progress-counts .ct-pending{color:var(--muted)}
/* Stats row */
.tp-stats-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tp-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px}
.tp-stat-num{font-size:18px;font-weight:800}
.tp-stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px}
/* Grid */
.tp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
/* Card base */
.tp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px 12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tp-card:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4)}
/* Left result strip */
.tp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;background:var(--border);transition:background .3s}
.tp-card.tp-pending{border-color:var(--border)}
.tp-card.tp-won{border-color:rgba(16,185,129,.5);background:linear-gradient(135deg,rgba(16,185,129,.08) 0%,var(--card) 100%)}
.tp-card.tp-won::before{background:#10b981}
.tp-card.tp-placed{border-color:rgba(59,130,246,.4);background:linear-gradient(135deg,rgba(59,130,246,.06) 0%,var(--card) 100%)}
.tp-card.tp-placed::before{background:#3b82f6}
.tp-card.tp-lost{border-color:rgba(239,68,68,.35);background:linear-gradient(135deg,rgba(239,68,68,.05) 0%,var(--card) 100%);opacity:.7}
.tp-card.tp-lost::before{background:#ef4444}
.tp-card.tp-nr{opacity:.5}
.tp-card.tp-nr::before{background:var(--muted)}
/* Result banner */
.tp-result-banner{position:absolute;top:0;right:0;padding:4px 14px 4px 18px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border-radius:0 10px 0 12px}
.trb-won{background:rgba(16,185,129,.25);color:#34d399}
.trb-placed{background:rgba(59,130,246,.2);color:#60a5fa}
.trb-lost{background:rgba(239,68,68,.2);color:#f87171}
.trb-nr{background:rgba(100,116,139,.15);color:var(--muted)}
/* Rank */
.tp-rank{position:absolute;top:10px;left:14px;font-size:20px;font-weight:900;color:var(--gold);opacity:.3;font-family:monospace}
.tp-card.tp-won .tp-rank{color:#10b981;opacity:.5}
.tp-card.tp-placed .tp-rank{color:#3b82f6;opacity:.4}
.tp-card.tp-lost .tp-rank{color:#ef4444;opacity:.3}
/* Card body */
.tp-card-body{margin-left:28px}
.tp-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.tp-venue-time{font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;display:flex;align-items:center;gap:6px}
.tp-venue-time .vt-venue{color:var(--accent)}
.tp-venue-time .vt-time{color:var(--muted)}
.tp-horse-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.tp-horse{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tp-finish-pos{font-size:13px;font-weight:800;padding:2px 8px;border-radius:5px;flex-shrink:0;letter-spacing:.5px}
.fp-won{background:rgba(16,185,129,.2);color:#34d399}
.fp-placed{background:rgba(59,130,246,.15);color:#60a5fa}
.fp-lost{background:rgba(239,68,68,.15);color:#f87171}
.fp-nr{background:rgba(100,116,139,.1);color:var(--muted)}
.tp-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.tp-bottom{display:flex;justify-content:space-between;align-items:center}
.tp-bet{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700}
.tp-win{background:rgba(5,150,105,.3);color:#34d399}
.tp-ew{background:rgba(59,130,246,.25);color:#60a5fa}
.tp-place{background:rgba(245,158,11,.2);color:#fbbf24}
.tp-score-info{font-size:11px;color:var(--muted)}
/* Threshold badges */
.thresh-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px}
.thresh-bet{background:rgba(5,150,105,.15);color:var(--accent)}
.thresh-skip{background:rgba(239,68,68,.12);color:#ef4444}
/* Auto-cal */
.tp-auto-cal{margin-top:10px;padding:10px 12px;background:linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.04));border:1px solid rgba(251,191,36,.3);border-radius:8px;font-size:12px}
.tp-auto-cal-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px}
.tp-auto-cal-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted)}
.tp-auto-cal-row b{color:var(--text)}
/* Picks history strip */
.tp-history{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
.tp-hist-day{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .2s;text-align:center;min-width:60px;line-height:1.3}
.tp-hist-day:hover{opacity:.85;transform:translateY(-1px)}
.tp-hist-day.active{border-color:var(--gold)!important;box-shadow:0 0 8px rgba(251,191,36,.3)}
/* Feedback panel */
.tp-feedback{margin-top:12px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px}
.tp-feedback-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:8px}
.tp-insight{padding:4px 0;color:var(--muted);line-height:1.5}
.tp-insight b{color:var(--text)}
.tp-insight .positive{color:#34d399}
.tp-insight .negative{color:#f87171}
.tp-insight .neutral{color:var(--warn)}

/* Modal overlay */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:24px}
.modal h2{font-size:18px;margin-bottom:12px;color:var(--accent)}
.modal h3{font-size:14px;margin:14px 0 6px;color:var(--text)}
.modal p,.modal li{font-size:13px;color:var(--muted);line-height:1.6}
.modal ul{margin-left:18px}
.modal li{margin-bottom:4px}
.modal code{background:var(--card2);padding:2px 6px;border-radius:3px;font-size:12px;color:var(--accent)}
.modal textarea{width:100%;height:180px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:10px;font-size:12px;font-family:monospace;resize:vertical}
.modal .mbtn{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-weight:600;font-size:13px;margin-top:10px}
.modal .mbtn:hover{opacity:.9}
.modal .mclose{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
.modal .mclose:hover{color:var(--text)}

/* Momentum indicators */
.mom{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.mom-rise{background:rgba(5,150,105,.2);color:#34d399}
.mom-srise{background:rgba(5,150,105,.12);color:#6ee7b7}
.mom-steady{background:rgba(156,163,175,.12);color:#9ca3af}
.mom-sfall{background:rgba(245,158,11,.15);color:#fbbf24}
.mom-fall{background:rgba(239,68,68,.2);color:#f87171}

/* Guide-specific styles */
.guide-section{background:var(--card2);border-radius:10px;padding:14px 16px;margin-bottom:14px;border-left:3px solid var(--accent)}
.guide-section.warn{border-left-color:var(--warn)}
.guide-section.info{border-left-color:var(--accent2)}
.guide-section.fire{border-left-color:#ef4444}
.guide-section h3{margin:0 0 6px;font-size:14px;color:var(--text);display:flex;align-items:center;gap:6px}
.guide-section h3 .gi{font-size:16px}
.guide-section p,.guide-section li{font-size:12px;color:var(--muted);line-height:1.7}
.guide-section ul{margin:6px 0 0 16px;padding:0}
.guide-screenshot{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin:8px 0;font-size:11px;color:var(--muted);text-align:center}
.guide-screenshot .gs-mock{display:grid;gap:6px;margin-top:6px}
.guide-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.guide-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0;font-size:11px}
.guide-flow .gf-step{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--text);font-weight:600}
.guide-flow .gf-arrow{color:var(--accent);font-weight:700}
.guide-tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.guide-tier-grid .gt{border-radius:6px;padding:6px 8px;text-align:center;font-size:11px;font-weight:600}
@media(max-width:700px){.race-cards{grid-template-columns:1fr}.exp-inner{grid-template-columns:1fr}}

/* Results Input Panel — inline in race detail */
.ri-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:16px}
.ri-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ri-header-title{font-weight:700;font-size:13px}
.ri-mode-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.ri-mode-btn{padding:5px 12px;font-size:11px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.ri-mode-btn.active-rank{background:var(--accent);color:#fff}
.ri-mode-btn.active-nr{background:#ef4444;color:#fff}
.ri-mode-btn:not(.active-rank):not(.active-nr){background:var(--card2);color:var(--muted)}
.ri-tiles{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.ri-tile{padding:8px 14px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;transition:all .15s;background:var(--bg);position:relative;user-select:none}
.ri-tile:hover{border-color:var(--accent);background:#1a1a2e}
.ri-tile.ranked{background:var(--accent);color:#fff;border-color:var(--accent)}
.ri-tile.nr{background:#2a1a1a;color:#ef4444;text-decoration:line-through;border-color:#3a2020}
.ri-badge{display:inline-block;min-width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;background:#fff;color:var(--accent);font-size:11px;font-weight:700;margin-right:6px}
.ri-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
.ri-actions button{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:600}
.ri-save{background:var(--accent);color:#fff}
.ri-save:disabled{opacity:0.4;cursor:not-allowed}
.ri-undo{background:var(--card);color:var(--fg);border:1px solid var(--border)!important}
.ri-status{font-size:11px;color:var(--muted);margin-left:auto}

/* Tab Bar (top-level Races/Performance) */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 28px}
.tab-btn{padding:10px 20px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--fg)}

/* Race detail sub-tabs (MAIN / DEEP DIVE) */

.day-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

<body>
<div class="hdr">
<div>
<h1>Daily Horse Racing Analyzer</h1>
<div style="font-size:11px;color:var(--muted);margin-top:2px">14 Variables • Form + Rating + Trainer + Jockey + Fitness + Class + Going + Course + Distance + Age + Weight + Draw + Headgear + Expert • <b>All times UK (GMT/BST)</b></div>
</div>
<div class="hdr-r">
<span id="dataSourceBadge" style="font-size:11px;padding:4px 10px;border-radius:12px;font-weight:600;display:none"></span>
<button class="vbtn" onclick="showPaste()" style="font-size:11px" title="Load fresh JSON data">📋 Load JSON</button>
<button class="vbtn" id="clearDataBtn" onclick="clearStoredData().catch(e=>console.error('clearStoredData error:',e))" style="font-size:11px;display:none" title="Clear stored data and revert to sample">🗑 Clear Data</button>
<button class="vbtn" onclick="showGuide()" style="font-size:11px" title="How to use this tool">❓ Guide</button>
<button class="vbtn" id="pdfExportBtn" onclick="exportPDF()" style="font-size:11px;border-color:var(--accent2);color:var(--accent2)" title="Download PDF cheat sheet — top 5 per race for offline use">📄 PDF</button>
<span class="date-b" id="dateDisp">Loading...</span>
<span style="color:var(--muted);font-size:12px" id="statusDisp"></span>

</div>

  <button class="tab-btn active" id="tabRaces" onclick="switchTab('races')">Races</button>
  <button class="tab-btn" id="tabPerf" onclick="switchTab('performance')">Performance</button>

</div>

</div>

<div id="modalContainer"></div>

<script>
let D=null, st={venue:'all', openRace:null, sort:'score', sortDir:-1, expanded:null, detailTab:'main', riMode:'rank', h2hPair:null};

// ==================== PER-DAY DATA STATUS TRACKER ====================
async function getDayStatus(date){
  if(!date) return null;
  const hist=window._resultsHistory;
  const dayData=await loadDayData(date);
  if(!dayData||!dayData.venues) return null;
  // Count total races for this day
  let totalRaces=0;
  Object.values(dayData.venues).forEach(v=>{totalRaces+=v.races.length;});
  // Count logged races
  let loggedRaces=0;
  if(hist&&hist.races){
    Object.entries(dayData.venues).forEach(([vk,v])=>{
      v.races.forEach(r=>{
        const dupKey=date+vk+r.time;
        if(hist.races.some(hr=>(hr.date+hr.venue+hr.time)===dupKey)) loggedRaces++;
      });
    });
  }
  // Picks saved?
  const picks=loadTop10Picks(date);
  const hasPicks=picks&&picks.picks&&picks.picks.length>0;
  // Picks calibration done for this date?
  const calHist=getPicksCalibrationHistory();
  const hasCalibration=calHist&&calHist.lastDate===date;
  // Threshold has data? (global — computed from all historical)
  const threshData=await computeThresholdAnalysis();
  const hasThreshold=threshData&&threshData.optimalThreshold!==null;
  // PDF exported for this date?
  const pdfLog=getPDFExportLog();
  const hasPDF=pdfLog&&pdfLog[date]?true:false;
  // Summary
  const allLogged=loggedRaces>=totalRaces&&totalRaces>0;
  const allDone=allLogged&&hasPicks&&hasCalibration&&hasPDF;
  return {date,totalRaces,loggedRaces,allLogged,hasPicks,hasCalibration,hasThreshold,hasPDF,allDone};
}
async function renderStatusBar(){
  const el=document.getElementById('statusBar');if(!el) return;
  const date=D&&D.date?D.date:null;
  if(!date){el.innerHTML='';return;}
  const s=await getDayStatus(date);
  if(!s){el.innerHTML='';return;}
  const items=[];
  // Results
  if(s.allLogged) items.push(`<span class="sb-item sb-ok" title="All ${s.totalRaces} races logged">✓ Results ${s.loggedRaces}/${s.totalRaces}</span>`);
  else items.push(`<span class="sb-item sb-warn" title="${s.loggedRaces} of ${s.totalRaces} races logged">⏳ Results ${s.loggedRaces}/${s.totalRaces}</span>`);
  // Picks
  if(s.hasPicks) items.push(`<span class="sb-item sb-ok" title="Top 10 picks saved">✓ Picks</span>`);
  else items.push(`<span class="sb-item sb-off" title="No picks generated yet">— Picks</span>`);
  // Calibration
  if(s.hasCalibration) items.push(`<span class="sb-item sb-ok" title="Picks calibrated for this day">✓ Calibrated</span>`);
  else if(s.loggedRaces>=3) items.push(`<span class="sb-item sb-warn" title="3+ results logged but calibration not run yet">⏳ Calibrate</span>`);
  else items.push(`<span class="sb-item sb-off" title="Need 3+ logged results to calibrate">— Calibrate</span>`);
  // Threshold
  if(s.hasThreshold) items.push(`<span class="sb-item sb-ok" title="Confidence threshold computed">✓ Threshold</span>`);
  else items.push(`<span class="sb-item sb-off" title="Need 10+ historical picks to compute threshold">— Threshold</span>`);
  // PDF
  if(s.hasPDF){
    const pLog=getPDFExportLog();const pEntry=pLog[date];
    const pTime=pEntry?new Date(pEntry.exportedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
    items.push(`<span class="sb-item sb-ok" title="PDF exported: ${pEntry?pEntry.filename:''} at ${pTime}">✓ PDF</span>`);
  }else{
    items.push(`<span class="sb-item sb-off" title="PDF not yet exported for this day">— PDF</span>`);
  }
  // Overall badge
  const greenCount=items.filter(i=>i.includes('sb-ok')).length;
  const total=items.length;
  let badge;
  if(s.allDone&&s.hasThreshold) badge=`<span class="sb-badge sb-badge-ok" title="All data pipelines complete for ${date}">✓ Day Complete</span>`;
  else if(greenCount===0) badge=`<span class="sb-badge sb-badge-none">No data yet</span>`;
  else badge=`<span class="sb-badge sb-badge-partial">${greenCount}/${total}</span>`;
  el.innerHTML=`<div class="sb-wrap">${badge}<div class="sb-items">${items.join('')}</div></div>`;
}
async function updateStatus(){await renderStatusBar();}

// PDF export log — persisted per date in localStorage
function getPDFExportLog(){try{return JSON.parse(localStorage.getItem('pdfExportLog')||'{}');}catch(e){return {};}}
async function markPDFExported(date){
  const log=getPDFExportLog();
  log[date]={exportedAt:new Date().toISOString(),filename:`racing_${date}.pdf`};
  localStorage.setItem('pdfExportLog',JSON.stringify(log));
  await renderStatusBar();
  renderPDFButton();
}
function renderPDFButton(){
  const btn=document.getElementById('pdfExportBtn');if(!btn) return;
  const date=D&&D.date?D.date:null;
  if(!date){btn.innerHTML='📄 PDF';btn.style.borderColor='var(--accent2)';btn.style.color='var(--accent2)';btn.title='Download PDF cheat sheet';return;}
  const log=getPDFExportLog();
  if(log[date]){
    const t=new Date(log[date].exportedAt);
    const timeStr=t.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    btn.innerHTML='📄 PDF ✓';
    btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)';
    btn.title=`Downloaded: ${log[date].filename} at ${timeStr}`;
  }else{
    btn.innerHTML='📄 PDF';
    btn.style.borderColor='var(--accent2)';btn.style.color='var(--accent2)';
    btn.title='Download PDF cheat sheet — top 5 per race for offline use';
  }

  jockey:{l:'Jockey',mx:10},fitness:{l:'Fitness',mx:8},class:{l:'Class',mx:8},
  going:{l:'Going',mx:8},course:{l:'Course',mx:6},distance:{l:'Distance',mx:6},
  age:{l:'Age',mx:7},weight:{l:'Weight',mx:8},draw:{l:'Draw',mx:5},
  headgear:{l:'Headgear',mx:3},spotlight:{l:'Expert',mx:2}
};
const MAX_SCORE=Object.values(FM).reduce((a,f)=>a+f.mx,0); // 118

/* ==================== ANALYSIS VERSION TRACKING ==================== */
const ENGINE_NAME='Prixm';
function getAnalysisVersion(){
  try{
    const v=localStorage.getItem('analysisVersion');
    if(!v) return 1.0;
    const n=parseFloat(v);
    // Migrate old 0.x scheme to new whole-number scheme
    if(n<1){ const migrated=Math.round(n*10); localStorage.setItem('analysisVersion',String(migrated)); return migrated; }
    return n;
  }catch(e){return 1.0;}
}
function bumpAnalysisVersion(){
  const cur=getAnalysisVersion();
  const next=parseFloat((cur+1).toFixed(1));
  try{localStorage.setItem('analysisVersion',String(next));}catch(e){}
  return next;
}
function engineLabel(ver){ return ENGINE_NAME+' '+(ver!=null?ver.toFixed(1):getAnalysisVersion().toFixed(1)); }
function weightsChanged(proposals,history){
  // Returns true if ANY profile's proposed weights differ from current stored weights
  if(!proposals||!proposals.length) return false;
  const wp=history&&history.weight_profiles||{};
  return proposals.some(res=>{
    const cur=wp[res.profile]||{};
    return res.factors.some(f=>(res.newW[f]||0)!==(cur[f]||0));
  });
}

function sc(s){const p=s/MAX_SCORE*100;return p>=64?'#059669':p>=55?'#0d9488':p>=47?'#2563eb':p>=38?'#d97706':'#ef4444'}
function pc(p){return p>=70?'#10b981':p>=50?'#f59e0b':'#ef4444'}
function confBadge(c){

}
function formHtml(f){

}
function wtStr(lbs){if(!lbs)return'—';return Math.floor(lbs/14)+'st'+lbs%14+'lb'}

// Form Momentum Engine — detects rising/falling trajectory from form string
function calcMomentum(formStr){
  if(!formStr||formStr.length<2) return {slope:0,label:'UNKNOWN',icon:'',cls:'',tip:'Not enough form data'};
  // Parse form chars to numeric positions (most recent first in the string)
  const positions=[];
  for(let i=0;i<Math.min(formStr.length,6);i++){
    const c=formStr[i];
    if(c>='1'&&c<='9') positions.push(parseInt(c));
    else if(c==='0') positions.push(10); // 0 = 10th
    else positions.push(12); // P/F/U/R = bad finish, treat as 12th
  }
  if(positions.length<2) return {slope:0,label:'UNKNOWN',icon:'',cls:'',tip:'Not enough form data'};
  // positions[0] = most recent, positions[n] = oldest
  // Linear regression: x=run index (0=oldest), y=position
  // We reverse so oldest=0, newest=last
  const pts=[...positions].reverse();
  const n=pts.length;
  const sumX=pts.reduce((_,__,i)=>_+i,0);
  const sumY=pts.reduce((a,v)=>a+v,0);
  const sumXY=pts.reduce((a,v,i)=>a+i*v,0);
  const sumX2=pts.reduce((a,_,i)=>a+i*i,0);
  const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  // Negative slope = positions getting smaller = improving
  // Positive slope = positions getting bigger = declining
  const recent3=positions.slice(0,3);
  const avgRecent=recent3.reduce((a,v)=>a+v,0)/recent3.length;
  let label,icon,cls,tip;
  if(slope<=-1.0){label='HOT';icon='🔥';cls='mom-rise';tip='Hot form — positions improving fast (slope: '+slope.toFixed(1)+')';}
  else if(slope<=-0.3){label='IMPROVING';icon='📈';cls='mom-srise';tip='Gradually improving form (slope: '+slope.toFixed(1)+')';}
  else if(slope<=0.3){label='STEADY';icon='➡️';cls='mom-steady';tip='Consistent form, no clear trend (slope: '+slope.toFixed(1)+')';}
  else if(slope<=1.0){label='DECLINING';icon='📉';cls='mom-sfall';tip='Gradually declining form (slope: '+slope.toFixed(1)+')';}
  else{label='COLD';icon='🧊';cls='mom-fall';tip='Cold form — positions getting worse fast (slope: '+slope.toFixed(1)+')';}
  return {slope:Math.round(slope*100)/100,label,icon,cls,tip,positions,avgRecent:Math.round(avgRecent*10)/10};
}
/* ==================== CDP: CLASS · DISTANCE · GOING · COURSE PROVEN ==================== */
function buildCDP(runner, race){
  const bd=runner.score_breakdown||{};
  // Use factor scores as primary signal: high score = proven, mid = untested, low = failed
  // FM has the max values for each factor
  const checks=[
    {key:'class', icon:'🏆', label:'Class',
      score:bd.class||0, max:FM.class.mx,
      provenNote:`Scored ${bd.class||0}/${FM.class.mx} on class factor${race.race_class?'. Today: Class '+race.race_class:''}`,
      untestedNote:`Class factor mid-range (${bd.class||0}/${FM.class.mx})${race.race_class?'. Today: Class '+race.race_class:''}`,
      failedNote:`Low class score (${bd.class||0}/${FM.class.mx})${race.race_class?'. May be outclassed at Class '+race.race_class:''}`},
    {key:'distance', icon:'📏', label:'Distance',
      score:bd.distance||0, max:FM.distance.mx,
      provenNote:`Scored ${bd.distance||0}/${FM.distance.mx} on distance factor. Today: ${race.distance||'?'}`,
      untestedNote:`Mid-range distance score (${bd.distance||0}/${FM.distance.mx}). Today: ${race.distance||'?'}`,
      failedNote:`Low distance score (${bd.distance||0}/${FM.distance.mx}). ${race.distance||'?'} may not suit`},
    {key:'going', icon:'🌧️', label:'Going',
      score:bd.going||0, max:FM.going.mx,
      provenNote:`Scored ${bd.going||0}/${FM.going.mx} on going factor. Today: ${race.going||'?'}`,
      untestedNote:`Going factor mid-range (${bd.going||0}/${FM.going.mx}). Today: ${race.going||'?'}`,
      failedNote:`Low going score (${bd.going||0}/${FM.going.mx}). ${race.going||'?'} may not suit`},
    {key:'course', icon:'📍', label:'Course',
      score:bd.course||0, max:FM.course.mx,
      provenNote:`Scored ${bd.course||0}/${FM.course.mx} on course factor. Today: ${race.course||'?'}`,
      untestedNote:`Course factor mid-range (${bd.course||0}/${FM.course.mx}). First/few runs at ${race.course||'?'}`,
      failedNote:`Low course score (${bd.course||0}/${FM.course.mx}). Poor record at ${race.course||'?'}`}
  ];
  // Enrich with spotlight/comment hints
  const spot=(runner.spotlight||'').toLowerCase()+(runner.comment||'').toLowerCase();
  let proven=0;
  const cards=checks.map(c=>{
    const pct=(c.score/c.max)*100;
    let status,statusLabel,statusCls,note;
    if(pct>=70){status='proven';statusLabel='✓ PROVEN';statusCls='cdp-proven';note=c.provenNote;proven++;}
    else if(pct>=40){status='untested';statusLabel='⚠ UNTESTED';statusCls='cdp-untested';note=c.untestedNote;}
    else{status='failed';statusLabel='✗ CONCERN';statusCls='cdp-failed';note=c.failedNote;}
    // Spotlight override hints
    if(c.key==='distance'&&spot.includes('trip'))note+=' (trip mentioned in spotlight)';
    if(c.key==='going'&&(spot.includes('ground')||spot.includes('going')))note+=' (going mentioned in spotlight)';
    if(c.key==='class'&&(spot.includes('class')||spot.includes('step up')||spot.includes('outclass')))note+=' (class context in spotlight)';
    if(c.key==='course'&&(spot.includes('course')||spot.includes('track')))note+=' (course form noted)';
    return {icon:c.icon,label:c.label,status,statusLabel,statusCls,note,pct:Math.round(pct)};
  });
  const scoreCls=proven>=3?'cdp-score-high':proven>=2?'cdp-score-mid':'cdp-score-low';
  const scoreCol=proven>=3?'#34d399':proven>=2?'#fbbf24':'#f87171';
  let summaryText='';
  const concerns=cards.filter(c=>c.status==='failed').map(c=>c.label.toLowerCase());
  const unknowns=cards.filter(c=>c.status==='untested').map(c=>c.label.toLowerCase());
  if(proven===4) summaryText='Fully proven across all criteria — no suitability concerns.';
  else if(concerns.length) summaryText=`<strong style="color:#f87171">${concerns.join(' & ')} ${concerns.length>1?'are':'is a'} concern${concerns.length>1?'s':''}</strong>${unknowns.length?' · '+unknowns.join(', ')+' untested':''}`;
  else if(unknowns.length) summaryText=`Proven where tested. <strong style="color:#fbbf24">${unknowns.join(' & ')} untested</strong> — watch for first-time factors.`;
  return {cards,proven,total:4,scoreCls,scoreCol,summaryText};
}

function renderCDPSection(runner, race){
  const cdp=buildCDP(runner,race);
  let h=`<div class="cdp-section"><div class="cdp-header">📋 Class · Distance · Going · Course — Proven Form</div><div class="cdp-grid">`;
  cdp.cards.forEach(c=>{
    h+=`<div class="cdp-card ${c.statusCls}"><div class="cdp-icon">${c.icon}</div>
      <div class="cdp-label">${c.label}</div>
      <div class="cdp-status-text ${c.statusCls}">${c.statusLabel}</div>
      <div class="cdp-detail">${c.note}</div>
      <div class="cdp-pct-bar"><div class="cdp-pct-fill" style="width:${c.pct}%;background:${c.status==='proven'?'#10b981':c.status==='untested'?'#f59e0b':'#ef4444'}"></div></div>
    </div>`;
  });
  h+=`</div><div class="cdp-summary"><div class="cdp-score-wrap"><div class="cdp-score-num" style="color:${cdp.scoreCol}">${cdp.proven}/4</div><div class="cdp-score-lbl">CDP Score</div></div><div class="cdp-summary-text">${cdp.summaryText}</div></div></div>`;
  return h;
}

/* ==================== SMART BETTING SIGNALS ENGINE ==================== */
function buildBettingSignal(runners, race){
  if(!runners||runners.length<2) return null;
  const sorted=[...runners].sort((a,b)=>b.score-a.score);
  const top=sorted[0], second=sorted[1], third=sorted[2];
  const gap=Math.round((top.score-second.score)*10)/10;
  const fs=race.field_size||runners.length;
  const mom=calcMomentum(top.form);
  const cdp=buildCDP(top,race);
  const topPct=Math.round(top.score/MAX_SCORE*100);

  // Edge strength calculation (0-100)
  let edge=0;
  edge+=Math.min(gap*2.5,30);            // Gap contribution (max 30 at 12+ gap)
  edge+=cdp.proven*8;                      // CDP contribution (max 32)
  edge+=topPct>=64?15:topPct>=55?10:5;    // Absolute score contribution
  if(mom.label==='HOT')edge+=12;
  else if(mom.label==='IMPROVING')edge+=8;
  else if(mom.label==='STEADY')edge+=4;
  else if(mom.label==='DECLINING')edge-=5;
  else if(mom.label==='COLD')edge-=10;
  if(fs<=8)edge+=6; else if(fs<=12)edge+=0; else edge-=4;   // Field size
  if(race.handicap)edge-=5;                                    // Handicap penalty
  edge=Math.max(0,Math.min(100,Math.round(edge)));

  // Determine bet type and confidence stars
  let betType,betCls,stars,label;
  if(edge>=70&&gap>=8&&cdp.proven>=3){
    betType='WIN';betCls='sig-win';stars=gap>=15?5:4;label='High Confidence';
  }else if(edge>=50&&gap>=5){
    betType='E/W';betCls='sig-ew';stars=edge>=65?4:3;label='Moderate Confidence';
  }else if(edge>=35&&gap>=3&&cdp.proven>=2){
    betType='PLACE';betCls='sig-place';stars=2;label='Low Confidence';
  }else{
    betType='SKIP';betCls='sig-skip';stars=1;label='No Clear Edge';
  }

  // Build reasoning
  let reasons=[];
  if(gap>=15) reasons.push(`Clear leader, ${gap}pt gap over ${second.name}`);
  else if(gap>=8) reasons.push(`Solid ${gap}pt advantage over ${second.name}`);
  else if(gap>=5) reasons.push(`Moderate ${gap}pt gap — competitive but separable`);
  else reasons.push(`Only ${gap}pt gap — hard to split the top runners`);

  if(cdp.proven===4) reasons.push('Proven on all CDP criteria');
  else if(cdp.proven>=3) reasons.push(`Strong CDP (${cdp.proven}/4 proven)`);
  else if(cdp.proven<=1) reasons.push(`CDP concern — only ${cdp.proven}/4 proven`);

  if(mom.label==='HOT'||mom.label==='IMPROVING') reasons.push(`Form momentum: ${mom.label}`);
  if(mom.label==='DECLINING'||mom.label==='COLD') reasons.push(`⚠ Form momentum: ${mom.label}`);

  if(fs>=12) reasons.push(`Large field (${fs}) dilutes edge`);
  if(race.handicap) reasons.push('Handicap — compressed ratings');

  // Build positive/negative factor tags
  const tags=[];
  if(gap>=8) tags.push({t:`${gap}pt gap`,cls:'sf-pos'});
  else if(gap>=5) tags.push({t:`${gap}pt gap`,cls:'sf-neutral'});
  else tags.push({t:`${gap}pt gap (tight)`,cls:'sf-neg'});

  const form=top.form||'';
  if(form.startsWith('1')||form.startsWith('11')) tags.push({t:'Recent winner',cls:'sf-pos'});
  tags.push({t:`CDP ${cdp.proven}/4`,cls:cdp.proven>=3?'sf-pos':cdp.proven>=2?'sf-neutral':'sf-neg'});
  tags.push({t:`Momentum: ${mom.label}`,cls:mom.label==='HOT'||mom.label==='IMPROVING'?'sf-pos':mom.label==='STEADY'?'sf-neutral':'sf-neg'});
  if(race.handicap) tags.push({t:'Handicap',cls:'sf-neutral'});
  if(fs>=12) tags.push({t:`${fs} runners`,cls:'sf-neg'});
  else if(fs<=8) tags.push({t:`${fs} runners (small)`,cls:'sf-pos'});

  const cdpConcerns=cdp.cards.filter(c=>c.status==='failed');
  cdpConcerns.forEach(c=>tags.push({t:`${c.label} concern`,cls:'sf-neg'}));
  const cdpUntested=cdp.cards.filter(c=>c.status==='untested');
  cdpUntested.forEach(c=>tags.push({t:`${c.label} untested`,cls:'sf-neutral'}));

  // Secondary signal (E/W hedge or danger)
  let secondary=null;
  if(betType==='WIN'&&second&&third){
    const gap23=Math.round((second.score-third.score)*10)/10;
    secondary={type:'E/W',text:`${second.name} (${second.score}) and ${third.name} (${third.score}) separated by ${gap23}pts — place frame is ${gap23<=3?'wide open':'defined'}. E/W covers downside if the edge doesn't hold.`};
  }else if(betType==='E/W'&&second){
    secondary={type:'DANGER',text:`${second.name} (${second.score}) is the main danger — ${gap<6?'very close to the pick':'within striking distance'}.`};
  }

  return {betType,betCls,stars,label,edge,reasons,tags,secondary,topName:top.name,topScore:top.score,gap,fs,cdpProven:cdp.proven,momLabel:mom.label};
}

function renderBettingSignal(runners, race){
  const sig=buildBettingSignal(runners,race);
  if(!sig) return '';
  const starHtml=Array.from({length:5},(_, i)=>`<span class="${i<sig.stars?'star-on':'star-off'}">★</span>`).join('');
  const edgeCol=sig.edge>=70?'#10b981':sig.edge>=50?'#06b6d4':sig.edge>=35?'#f59e0b':'#ef4444';
  const edgeGrad=sig.edge>=70?'#10b981,#059669':sig.edge>=50?'#06b6d4,#0891b2':sig.edge>=35?'#f59e0b,#d97706':'#ef4444,#dc2626';

  let h=`<div class="betting-panel${sig.betType==='SKIP'?' bp-skip':''}">
    <div class="bp-title"><span>💰</span> ${ENGINE_NAME} Betting Signal</div>
    <div class="signal-row">
      <div class="signal-card${sig.betType!=='SKIP'?' sc-primary':''}">
        <div class="sc-label">Recommended Bet</div>
        <div class="sc-horse">${sig.topName}</div>
        <div class="sc-type ${sig.betCls}">${sig.betType}</div>
        <div class="sc-stars">${starHtml}</div>
        <div class="sc-conf">${sig.label}</div>
      </div>
      <div class="signal-card sc-edge-card">
        <div class="sc-label">Edge Strength</div>
        <div class="edge-bar"><div class="edge-fill" style="width:${sig.edge}%;background:linear-gradient(90deg,${edgeGrad})"></div></div>
        <div class="edge-markers"><span>Weak</span><span>Moderate</span><span>Strong</span><span>Elite</span></div>
        <div class="edge-value" style="color:${edgeCol}">${sig.edge} / 100</div>
        <div class="edge-detail">Gap: ${sig.gap}pts · Field: ${sig.fs} · CDP: ${sig.cdpProven}/4 · Momentum: ${sig.momLabel}</div>
      </div>
    </div>
    <div class="signal-reasoning"><strong style="color:var(--text)">Why ${sig.betType}:</strong> ${sig.reasons.join('. ')}.</div>
    <div class="signal-factors">${sig.tags.map(t=>`<span class="signal-factor ${t.cls}">${t.cls==='sf-pos'?'✓':t.cls==='sf-neg'?'✗':'—'} ${t.t}</span>`).join('')}</div>`;
  if(sig.secondary){
    h+=`<div class="secondary-signal"><div><div class="ss-label">If hedging:</div><span class="ss-badge">${sig.secondary.type}</span></div><div class="ss-text">${sig.secondary.text}</div></div>`;
  }
  h+=`</div>`;
  return h;
}

function buildRaceBrief(race, rCombos){
  // Build race brief strip data from top runner analysis
  if(!race.runners||!race.runners.length) return '';
  const sorted=[...race.runners].sort((a,b)=>b.score-a.score);
  const top=sorted[0];
  const second=sorted[1];
  if(!top) return '';
  const gap=second?Math.round((top.score-second.score)*10)/10:0;
  const avg=sorted.reduce((a,r)=>a+r.score,0)/sorted.length;

  // 1) Key factor edges — top 3 scoring factors for the leader
  let edgeHtml='';
  if(top.score_breakdown){
    const factors=Object.entries(top.score_breakdown)
      .filter(([k])=>FM[k])
      .sort((a,b)=>b[1]-a[1])
      .slice(0,3)
      .map(([k,v])=>`${FM[k].l.toLowerCase()} ${v}`)
      .join(' · ');
    if(factors) edgeHtml=`<span class="brief-tag brief-edge">🎯 ${factors}</span>`;
  }

  // 2) Momentum icon for top pick
  const mom=calcMomentum(top.form);
  const momHtml=mom.label!=='UNKNOWN'?`<span class="brief-mom" title="${mom.tip}">${mom.icon}</span>`:'';

  // 3) Combo alert (first combo if any)
  let comboHtml='';
  if(rCombos&&rCombos.length){
    const m=rCombos[0];
    const pr=Math.round(m.combo.placeRate);
    comboHtml=`<span class="brief-tag brief-combo">⚡ COMBO ${m.combo.type.replace('+',' + ')} ${pr}% placed</span>`;
  }

  // 4) Danger horse — 2nd place within 8 pts and scored 60%+
  let dangerHtml='';
  if(second && gap<=8 && second.score/MAX_SCORE>=0.5){
    dangerHtml=`<span class="brief-tag brief-danger">⚠ Danger: ${second.name.split(' ').slice(0,2).join(' ')}</span>`;
  }

  // 5) Verdict tag
  let verdictHtml='';
  const topPct=top.score/MAX_SCORE*100;
  if(topPct<40||(gap<=3&&sorted.length>=8)){
    verdictHtml=`<span class="brief-tag brief-skip">No separation</span>`;
  } else if(gap>=15){
    verdictHtml=`<span class="brief-tag brief-verdict">Clear leader (${gap}pts)</span>`;
  } else if(gap>=8){
    verdictHtml=`<span class="brief-tag brief-verdict">Strong edge (${gap}pts)</span>`;
  } else if(gap>=4){
    verdictHtml=`<span class="brief-tag brief-verdict">Competitive (${gap}pts)</span>`;
  } else {
    verdictHtml=`<span class="brief-tag brief-verdict" style="background:rgba(107,114,128,.12);border-color:rgba(107,114,128,.3);color:#9ca3af">Tight field (${gap}pts)</span>`;
  }

  return `<div class="race-brief">${edgeHtml}${momHtml}${comboHtml}${dangerHtml}${verdictHtml}</div>`;
}

function varTicks(bd){
  if(!bd)return'';
  const keys=Object.keys(FM);
  return '<div class="vtg">'+keys.map(k=>{
    const v=bd[k]||0,mx=FM[k].mx,pct=v/mx;
    const cl=pct>=0.7?'vt-g':pct>=0.4?'vt-y':'vt-r';
    return `<div class="vt ${cl}" title="${FM[k].l}: ${v}/${mx}">${v}</div>`;
  }).join('')+'</div>';
}

/* ==================== PROFILE CLASSIFIER ==================== */
function classifyProfile(surface,raceType){
  const rt=(raceType||'').toLowerCase(),s=(surface||'').toLowerCase();
  if(s==='aw'||s==='all-weather') return 'aw';
  if(['hurdle','chase','nh flat','bumper'].some(x=>rt.includes(x))) return 'nh';
  return 'turf_flat';
}

let resultState={};

function renderResultsLogger(venueKey,raceIdx){
  const key=venueKey+'_'+raceIdx;
  if(!resultState[key]) resultState[key]={ranked:[],nrs:[],pus:[],editing:false};
  const race=D.venues[venueKey].races[raceIdx];
  const rs=resultState[key];
  if(!rs.pus) rs.pus=[];
  const mode=st.riMode||'rank';
  // Check if already logged
  const hist=window._resultsHistory;
  const dupKey=(D.date||'')+venueKey+race.time;
  const loggedEntry=hist&&hist.races&&hist.races.find(r=>(r.date+r.venue+r.time)===dupKey);

  // Show saved state if logged and NOT in edit mode
  if(loggedEntry&&!rs.editing){
    const ranked=loggedEntry.results.filter(r=>!r.non_runner&&!r.pull_out&&r.finish_pos).sort((a,b)=>a.finish_pos-b.finish_pos);

        ${nrs.length?`<span style="display:inline-block;margin:2px 4px;padding:2px 8px;border-radius:4px;background:#2a1a1a;color:#ef4444;text-decoration:line-through">${nrs.map(r=>r.name).join(', ')} (NR)</span>`:''}
        ${pus.length?`<span style="display:inline-block;margin:2px 4px;padding:2px 8px;border-radius:4px;background:#2a1a0a;color:#f59e0b;text-decoration:line-through">${pus.map(r=>r.name).join(', ')} (PU)</span>`:''}

  return `<div class="ri-panel" id="resultsPanel_${key}">
    <div class="ri-header">
      <div class="ri-header-title">${mode==='rank'?'Click horses in finishing order':mode==='nr'?'Click to mark non-runners':'Click to mark pulled out'}${rs.editing?' (editing)':''}</div>
      <div class="ri-mode-toggle">
        <button class="ri-mode-btn ${mode==='rank'?'active-rank':''}" onclick="st.riMode='rank';renderDetail().catch(e=>console.error('renderDetail error:',e))">🏇 Rank</button>
        <button class="ri-mode-btn ${mode==='nr'?'active-nr':''}" onclick="st.riMode='nr';renderDetail().catch(e=>console.error('renderDetail error:',e))">🚫 NR</button>
        <button class="ri-mode-btn ${mode==='pu'?'active-nr':''}" onclick="st.riMode='pu';renderDetail().catch(e=>console.error('renderDetail error:',e))" style="${mode==='pu'?'background:#f59e0b22;color:#f59e0b;border-color:#f59e0b':''}">⛔ PU</button>
      </div>
    </div>
    <div class="ri-tiles">${race.runners.map(r=>{
      const ranked=rs.ranked.find(x=>x.name===r.name);
      const isNR=rs.nrs.includes(r.name);

      const cls=ranked?'ranked':(isNR?'nr':(isPU?'nr':''));
      const badge=ranked?`<span class="ri-badge">${ranked.pos}</span>`:(isNR?'<span style="font-size:10px;margin-right:4px">🚫</span>':(isPU?'<span style="font-size:10px;margin-right:4px;color:#f59e0b">⛔</span>':''));
      const esc=r.name.replace(/'/g,"\\'");
      return `<div class="ri-tile ${cls}" onclick="tileTap('${key}','${esc}')"${isPU?' style="border-color:#f59e0b;background:#f59e0b11"':''}>${badge}${r.name}</div>`;

}

function tileTap(key,name){
  const rs=resultState[key]||(resultState[key]={ranked:[],nrs:[],pus:[]});
  if(!rs.pus) rs.pus=[];
  if(rs.ranked.find(x=>x.name===name)||rs.nrs.includes(name)||rs.pus.includes(name)) return;
  if(st.riMode==='nr'){
    rs.nrs.push(name);
  }else if(st.riMode==='pu'){
    rs.pus.push(name);
  }else{
    rs.ranked.push({name,pos:rs.ranked.length+1});
  }
  renderDetail();
}

function undoLast(key){
  const rs=resultState[key];if(!rs) return;
  if(st.riMode==='pu'&&rs.pus&&rs.pus.length){rs.pus.pop();}
  else if(st.riMode==='nr'&&rs.nrs.length){rs.nrs.pop();}
  else if(rs.ranked.length){rs.ranked.pop();}
  renderDetail();
}

function resetResults(key){
  resultState[key]={ranked:[],nrs:[],pus:[],editing:false};
  renderDetail();
}

function editLoggedResults(venueKey,raceIdx){
  const key=venueKey+'_'+raceIdx;
  // Pre-fill from logged data so user can see and modify
  const hist=window._resultsHistory;

  const dupKey=(D.date||'')+venueKey+race.time;
  const entry=hist&&hist.races&&hist.races.find(r=>(r.date+r.venue+r.time)===dupKey);

    const ranked=entry.results.filter(r=>!r.non_runner&&!r.pull_out&&r.finish_pos).sort((a,b)=>a.finish_pos-b.finish_pos).map(r=>({name:r.name,pos:r.finish_pos}));
    const nrs=entry.results.filter(r=>r.non_runner).map(r=>r.name);

  }

}

function cancelEdit(key){

/* ==================== DAILY TOP PICKS AUTO-CALIBRATION ==================== */
function checkDailyPicksCalibration(){
  if(!D||!D.date) return;
  const hist=window._resultsHistory;
  if(!hist||!hist.races) return;
  const currentDate=D.date;
  // Count total races today vs logged races today
  let totalRaces=0;
  Object.values(D.venues).forEach(v=>{totalRaces+=v.races.length;});
  const loggedToday=hist.races.filter(r=>r.date===currentDate).length;
  // Only auto-calibrate when at least 80% of races logged
  if(loggedToday<Math.ceil(totalRaces*0.8)) return;
  // Check if we already calibrated today
  const calKey='picksCalibration';
  let calData;
  try{calData=JSON.parse(localStorage.getItem(calKey)||'{}');}catch(e){calData={};}
  if(calData.lastDate===currentDate) return; // already done today
  applyPicksCalibration(currentDate,hist);
}

function submitPickResults(){
  // Manual trigger: run calibration with whatever picks have results logged so far
  if(!D||!D.date) return;
  const hist=window._resultsHistory;
  if(!hist||!hist.races) return;
  const currentDate=D.date;
  // One-time guard: block if already submitted for this date
  const calCheck=getPicksCalibrationHistory();
  if(calCheck&&calCheck.history&&calCheck.history.some(h=>h.date===currentDate)){
    document.getElementById('modalContainer').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:450px">
      <button class="mclose" onclick="closeModal()">&times;</button>
      <h2>Already Submitted</h2>
      <p>Pick results for <b>${currentDate}</b> have already been submitted and calibrated.</p>
      <p style="margin-top:8px;color:var(--muted)">This is a one-time action per day. Tomorrow's picks are already using today's data.</p>
    </div></div>`;
    return;
  }
  const picks=loadTop10Picks(currentDate);
  if(!picks||!picks.picks) return;
  // Check how many picks have logged results
  let loggedCount=0;
  picks.picks.forEach(p=>{
    const dupKey=currentDate+p.venueKey+p.time;
    const rr=hist.races.find(r=>(r.date+r.venue+r.time)===dupKey);
    if(rr){
      const hr=rr.results.find(r=>r.name===p.horse);
      if(hr&&!hr.non_runner&&!hr.pull_out&&hr.finish_pos) loggedCount++;
    }
  });
  if(loggedCount<3){
    document.getElementById('modalContainer').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:450px">
      <button class="mclose" onclick="closeModal()">&times;</button>
      <h2>Not Enough Results</h2>
      <p>Only ${loggedCount}/10 picks have logged results. Need at least 3 to run calibration.</p>
      <p style="margin-top:8px;color:var(--muted)">Log more race results first, then try again.</p>
    </div></div>`;
    return;
  }
  applyPicksCalibration(currentDate,hist);
  updateStatus();
  // Show confirmation — adjustments apply to NEXT day's picks, not today's
  document.getElementById('modalContainer').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:450px">
    <button class="mclose" onclick="closeModal()">&times;</button>
    <h2 style="color:var(--accent)">✓ Pick Results Submitted</h2>
    <p>Calibration complete using ${loggedCount}/10 picks with results.</p>
    <p style="margin-top:8px">Today's picks are <b>locked</b> — they won't change so you can track them.</p>
    <p style="margin-top:4px">Adjustments will apply to <b>tomorrow's picks</b> to improve selection.</p>
    <button class="mbtn" onclick="closeModal();renderTopPicks().catch(e=>console.error('renderTopPicks error:',e))" style="margin-top:12px;width:100%">OK</button>
  </div></div>`;
}

function applyPicksCalibration(date,hist){
  const result=runDailyPicksCalibration(date,hist);
  if(!result) return;
  const calKey='picksCalibration';
  let calData;
  try{calData=JSON.parse(localStorage.getItem(calKey)||'{}');}catch(e){calData={};}
  // Remove old entry for same date if re-submitting
  calData.history=calData.history||[];
  calData.history=calData.history.filter(h=>h.date!==date);
  calData.history.push(result);
  calData.lastDate=date;
  if(calData.history.length>30) calData.history=calData.history.slice(-30);
  localStorage.setItem(calKey,JSON.stringify(calData));
}

function runDailyPicksCalibration(date,hist){
  // Analyze today's top pick results to learn factor patterns
  const picks=loadTop10Picks(date);
  if(!picks||!picks.picks||!picks.picks.length) return null;
  const factors=['form','rating','trainer','jockey','fitness','class','going','course','distance','age','weight','draw','headgear','spotlight'];
  const maxes={form:20,rating:15,trainer:12,jockey:10,fitness:8,class:8,going:8,course:6,distance:6,age:7,weight:8,draw:5,headgear:3,spotlight:2};
  let winners=[],losers=[];
  picks.picks.forEach(p=>{
    const dupKey=date+p.venueKey+p.time;
    const raceResult=hist.races.find(r=>(r.date+r.venue+r.time)===dupKey);
    if(!raceResult) return;
    const horseResult=raceResult.results.find(r=>r.name===p.horse);
    if(!horseResult||horseResult.non_runner||horseResult.pull_out||!horseResult.finish_pos) return;
    const bd=p.scoreBreakdown||{};
    const fs=p.fieldSize||raceResult.field_size||12;
    if(horseResult.finish_pos<=getPlaceLimit(fs)) winners.push(bd);
    else losers.push(bd);
  });
  if(winners.length+losers.length<3) return null; // not enough data
  // Calculate factor effectiveness: avg score in winners vs losers per factor
  const effectiveness={};
  factors.forEach(f=>{
    const wAvg=winners.length?winners.reduce((a,bd)=>a+(bd[f]||0),0)/winners.length:0;
    const lAvg=losers.length?losers.reduce((a,bd)=>a+(bd[f]||0),0)/losers.length:0;
    const mx=maxes[f]||1;
    // Positive = factor was higher in winners, good predictor
    effectiveness[f]={wAvg:Math.round(wAvg*10)/10,lAvg:Math.round(lAvg*10)/10,delta:Math.round((wAvg-lAvg)*10)/10,wPct:Math.round(wAvg/mx*100),lPct:Math.round(lAvg/mx*100)};
  });
  // Generate pick_weights adjustments — stored for use in composite scoring
  // Factors with positive delta get boosted, negative get dampened
  const adjustments={};
  factors.forEach(f=>{
    const eff=effectiveness[f];
    // Scale: delta of +5 = +20% boost, -5 = -20% dampen, capped at ±30%
    const adj=Math.max(-0.3,Math.min(0.3,eff.delta/25));
    adjustments[f]=Math.round((1+adj)*100)/100;
  });
  const result={
    date,wins:winners.length,losses:losers.length,
    total:winners.length+losers.length,
    effectiveness,adjustments
  };
  // Save the adjustments for use in getTop10Picks
  localStorage.setItem('picksFactorAdj',JSON.stringify(adjustments));
  return result;
}

function getPicksFactorAdjustments(){
  // Only apply adjustments from previous days — never change current day's picks
  try{
    const raw=localStorage.getItem('picksFactorAdj');
    if(!raw) return null;
    const adj=JSON.parse(raw);
    // Check if adjustment was made for the current day — if so, it's for TOMORROW, not today
    const calHist=getPicksCalibrationHistory();
    if(calHist&&calHist.lastDate&&D&&D.date){
      // Adjustments created on date X apply to date X+1 onwards
      if(calHist.lastDate>=D.date) return null; // don't apply to same day or older
    }
    return adj;
  }catch(e){return null}
}

function getPicksCalibrationHistory(){
  try{const raw=localStorage.getItem('picksCalibration');return raw?JSON.parse(raw):null;}catch(e){return null}
}

/* ==================== PERFORMANCE TAB RENDERER ==================== */
async function renderPerformance(){
  const el=document.getElementById('perfContent');
  let history=window._resultsHistory;
  if(!history){const stored=localStorage.getItem('resultsHistory');if(stored){try{history=JSON.parse(stored);}catch(e){}}}
  if(!history){try{const r=await fetch('results_history.json?t='+Date.now());if(r.ok)history=await r.json();}catch(e){}}
  if(!history||!history.races||!history.races.length){
    el.innerHTML='<div class="nodata"><h2>No Results Logged Yet</h2><p>Log finishing positions using the "📝 Log Results" button on each race card.</p><p style="color:var(--muted);margin-top:8px">After logging 50+ races per surface type, weight calibration becomes available.</p></div>';
    return;
  }
  window._resultsHistory=history;
  const profiles=['all','aw','turf_flat','nh'];
  const pLabels={all:'All Surfaces',aw:'All-Weather',turf_flat:'Turf Flat',nh:'National Hunt'};

  function spearman(x,y){
    if(x.length<10) return 0;
    const rank=arr=>{const s=arr.map((v,i)=>[v,i]).sort((a,b)=>a[0]-b[0]);const r=new Array(arr.length);let i=0;while(i<s.length){let j=i;while(j<s.length&&s[j][0]===s[i][0])j++;const avg=(i+j+1)/2;for(let k=i;k<j;k++)r[s[k][1]]=avg;i=j;}return r;};
    const rx=rank(x),ry=rank(y),n=x.length;
    return 1-6*rx.reduce((a,v,i)=>a+(v-ry[i])**2,0)/(n*(n*n-1));
  }

  function computeStats(pf){
    let races=history.races;
    if(pf&&pf!=='all') races=races.filter(r=>r.profile===pf);
    const runners=[];
    races.forEach(race=>{(race.results||[]).forEach(res=>{
      if(res.non_runner||res.pull_out||!res.finish_pos) return;
      runners.push({fp:res.finish_pos,score:res.predicted_score||0,conf:res.predicted_confidence||'',bd:res.score_breakdown||{},fs:race.field_size||12,date:race.date});
    });});
    const tierOrder=['TOP PICK','STRONG','SOLID','MODERATE','WEAK','AVOID'];
    const positiveTiers=['TOP PICK','STRONG','SOLID'];
    const negativeTiers=['WEAK','AVOID'];
    const tiers=tierOrder.map(tier=>{
      const tr=runners.filter(r=>r.conf===tier);if(!tr.length) return null;
      const wins=tr.filter(r=>r.fp===1).length,placed=tr.filter(r=>r.fp<=getPlaceLimit(r.fs)).length;
      const avgFs=tr.reduce((a,r)=>a+r.fs,0)/tr.length;
      // Reverse metrics for WEAK/AVOID: bottom half, bottom quartile (field-size-aware), last
      const botHalf=tr.filter(r=>r.fp>Math.ceil(r.fs/2)).length;
      const botQ=tr.filter(r=>r.fp>Math.ceil(r.fs*0.75)).length;
      const last=tr.filter(r=>r.fp===r.fs).length;
      const isNeg=negativeTiers.includes(tier);
      return {
        tier,count:tr.length,
        win_rate:(wins/tr.length*100).toFixed(1),
        place_rate:(placed/tr.length*100).toFixed(1),
        exp:(Math.min(getPlaceLimit(Math.round(avgFs))/avgFs,1)*100).toFixed(1),
        bot_half_rate:(botHalf/tr.length*100).toFixed(1),
        botQ_rate:(botQ/tr.length*100).toFixed(1),
        last_rate:(last/tr.length*100).toFixed(1),
        isNeg
      };
    }).filter(Boolean);
    const factors=['form','rating','trainer','jockey','fitness','class','going','course','distance','age','weight','draw','headgear','spotlight'];
    const corrs={};
    factors.forEach(f=>{const p=runners.filter(r=>r.bd[f]!==undefined);if(p.length>=10) corrs[f]=parseFloat(spearman(p.map(r=>r.bd[f]),p.map(r=>-r.fp)).toFixed(3));});
    const pc={};['aw','turf_flat','nh'].forEach(p=>{pc[p]=history.races.filter(r=>r.profile===p).length;});
    return {tiers,corrs,raceCount:races.length,pc};
  }

  function computeWinnerAnalysis(pf){
    let races=history.races;
    if(pf&&pf!=='all') races=races.filter(r=>r.profile===pf);
    if(!races.length) return null;

    const raceResults=[];
    races.forEach(race=>{
      const results=(race.results||[]).filter(r=>!r.non_runner&&!r.pull_out&&r.finish_pos);
      if(results.length<2) return;
      const fs=race.field_size||results.length;
      const pl=getPlaceLimit(fs);
      // Sort by predicted score descending to find UI's #1 pick
      const sorted=[...results].sort((a,b)=>(b.predicted_score||0)-(a.predicted_score||0));
      const pick=sorted[0];
      const pickFP=pick.finish_pos;
      const pickWon=pickFP===1;
      const pickPlaced=pickFP<=pl;
      // Find actual winner and their UI rank
      const winner=results.find(r=>r.finish_pos===1);
      const winnerRank=winner?sorted.findIndex(r=>r.name===winner.name)+1:fs;
      // Score gap between #1 and #2
      const gap=sorted.length>=2?((sorted[0].predicted_score||0)-(sorted[1].predicted_score||0)):0;
      // Surface label
      const surface=(race.surface||'').toLowerCase();
      const surfaceLabel=surface.includes('aw')||surface.includes('all-weather')?'AW':surface.includes('poly')?'AW':'Turf';
      // Race type
      const rt=(race.race_type||'').toLowerCase();
      let raceTypeLabel='Flat';
      if(['hurdle','chase','nh flat','bumper'].some(x=>rt.includes(x))) raceTypeLabel='Jumps';
      // Venue
      const venue=(race.venue||'').replace(/^[a-z]_/,'').replace(/_/g,' ');

      raceResults.push({
        date:race.date,venue,time:race.time||'',
        pickName:pick.name,pickScore:pick.predicted_score||0,pickConf:pick.predicted_confidence||'',
        pickFinish:pickFP,pickWon,pickPlaced,
        winnerName:winner?winner.name:'?',winnerRank,winnerScore:winner?(winner.predicted_score||0):0,
        fieldSize:fs,placeLimit:pl,gap:Math.round(gap*10)/10,
        surface:surfaceLabel,raceType:raceTypeLabel,profile:race.profile||''
      });
    });

    if(!raceResults.length) return null;

    const totalRaces=raceResults.length;
    const wins=raceResults.filter(r=>r.pickWon).length;
    const placed=raceResults.filter(r=>r.pickPlaced).length;
    const winRate=Math.round(wins/totalRaces*100);
    const placeRate=Math.round(placed/totalRaces*100);
    const avgWinnerRank=(raceResults.reduce((a,r)=>a+r.winnerRank,0)/totalRaces).toFixed(1);

    // Helper: group by dimension and compute stats
    function groupBy(keyFn){
      const groups={};
      raceResults.forEach(r=>{
        const k=keyFn(r);
        if(!groups[k]) groups[k]={label:k,total:0,wins:0,placed:0,rankSum:0};
        groups[k].total++;
        if(r.pickWon) groups[k].wins++;
        if(r.pickPlaced) groups[k].placed++;
        groups[k].rankSum+=r.winnerRank;
      });
      return Object.values(groups).map(g=>({
        ...g,
        winRate:Math.round(g.wins/g.total*100),
        placeRate:Math.round(g.placed/g.total*100),
        avgRank:(g.rankSum/g.total).toFixed(1)
      })).sort((a,b)=>b.placeRate-a.placeRate);
    }

    const byFieldSize=groupBy(r=>{
      if(r.fieldSize<=5) return '2-5 runners';
      if(r.fieldSize<=8) return '6-8 runners';
      if(r.fieldSize<=12) return '9-12 runners';
      if(r.fieldSize<=16) return '13-16 runners';
      return '17+ runners';
    });
    const bySurface=groupBy(r=>r.surface);
    const byRaceType=groupBy(r=>r.raceType);
    const byGap=groupBy(r=>{
      if(r.gap>=15) return 'Dominant (15+)';
      if(r.gap>=8) return 'Clear (8-14)';
      if(r.gap>=3) return 'Moderate (3-7)';
      return 'Tight (0-2)';
    });
    const byVenue=groupBy(r=>r.venue.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '));
    // Filter venues with 2+ races
    const byVenueFiltered=byVenue.filter(v=>v.total>=2);

    // Collect sweet spots (>=80% place rate, 3+ races) from ALL dimensions
    const allGroups=[...byFieldSize,...bySurface,...byRaceType,...byGap,...byVenueFiltered];
    const sweetSpots=allGroups.filter(g=>g.placeRate>=80&&g.total>=3).sort((a,b)=>b.placeRate-a.placeRate||b.total-a.total);
    const weakSpots=allGroups.filter(g=>g.placeRate<30&&g.total>=3).sort((a,b)=>a.placeRate-b.placeRate);

    // Recent races sorted newest first
    const recentRaces=[...raceResults].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));

    return {totalRaces,wins,placed,winRate,placeRate,avgWinnerRank,
      byFieldSize,bySurface,byRaceType,byGap,byVenue:byVenueFiltered,
      sweetSpots:sweetSpots.slice(0,8),weakSpots:weakSpots.slice(0,5),
      recentRaces};
  }

  function renderPerfHTML(pf){

    // Split tiers into positive (should win) and negative (should lose)

      h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px"><h3 style="margin:0 0 4px;font-size:14px">Win Prediction Accuracy</h3><p style="font-size:11px;color:var(--muted);margin:0 0 10px">TOP PICK / STRONG / SOLID — should finish near the top</p><table style="width:100%;font-size:13px;border-collapse:collapse"><tr style="color:var(--muted);font-size:11px;text-align:left"><th style="padding:6px 8px">Tier</th><th>Count</th><th>Win %</th><th>Placed %</th><th>Expected %</th><th>Status</th></tr>${posTiers.map(t=>{

      }).join('')}</table></div>`;
    }
    if(negTiers.length){
      h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px"><h3 style="margin:0 0 4px;font-size:14px">Lose Prediction Accuracy</h3><p style="font-size:11px;color:var(--muted);margin:0 0 10px">WEAK / AVOID — should finish near the bottom. Higher % = model correctly identifies losers.</p><table style="width:100%;font-size:13px;border-collapse:collapse"><tr style="color:var(--muted);font-size:11px;text-align:left"><th style="padding:6px 8px">Tier</th><th>Count</th><th>Bottom Half %</th><th>Bot Quartile %</th><th>Last %</th><th>Status</th></tr>${negTiers.map(t=>{

      }).join('')}<div style="font-size:10px;color:var(--muted);margin-top:8px">Positive = factor predicts better finishes. Negative = factor misleads.</div></div>`;

    // ==================== RACE WINNER PREDICTION ANALYSIS ====================

      h+=renderBreakdownTable('By Field Size','How field size affects #1 pick accuracy',wa.byFieldSize,'Field Size');

    // ==================== CONFIDENCE THRESHOLD OPTIMIZER ====================
    const threshPerf=await computeThresholdAnalysis();

      const tp=threshPerf;
      const barMax=Math.max(...tp.curve.map(c=>c.placedRate),100);
      h+=`<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">
        <h3 style="margin:0 0 4px;font-size:14px">📊 Confidence Threshold Optimizer</h3>

            <div style="font-size:11px;color:var(--muted)">Optimal Threshold</div>
            <div style="font-size:24px;font-weight:800;color:${tp.hitsTarget?'var(--accent)':'var(--warn)'}">${tp.optimalThreshold}+</div>
            <div style="font-size:10px;color:var(--muted)">composite score</div>
          </div>
          <div style="background:var(--bg);border-radius:8px;padding:10px 16px;flex:1;min-width:140px;text-align:center">

/* ==================== CALIBRATION REPORT ==================== */
function _calibrateProfile(history,profile){
  // Internal: compute calibration for a single profile, returns result object or null
  const races=history.races.filter(r=>r.profile===profile);
  if(races.length<50) return null;
  const factors=['form','rating','trainer','jockey','fitness','class','going','course','distance','age','weight','draw','headgear','spotlight'];
  const oldW=history.weight_profiles?.[profile]||Object.fromEntries(factors.map((f,i)=>[f,[20,15,12,10,8,8,8,6,6,7,8,5,3,2][i]]));
  function spearman(x,y){
    if(x.length<10) return 0;
    const rank=arr=>{const s=arr.map((v,i)=>[v,i]).sort((a,b)=>a[0]-b[0]);const r=new Array(arr.length);let i=0;while(i<s.length){let j=i;while(j<s.length&&s[j][0]===s[i][0])j++;const avg=(i+j+1)/2;for(let k=i;k<j;k++)r[s[k][1]]=avg;i=j;}return r;};
    const rx=rank(x),ry=rank(y),n=x.length;
    return 1-6*rx.reduce((a,v,i)=>a+(v-ry[i])**2,0)/(n*(n*n-1));
  }
  const runners=[];
  races.forEach(race=>{(race.results||[]).forEach(res=>{
    if(res.non_runner||res.pull_out||!res.finish_pos) return; // exclude NR, PU, DNF
    runners.push({fp:res.finish_pos,bd:res.score_breakdown||{}});
  });});
  const corrs={};
  factors.forEach(f=>{const p=runners.filter(r=>r.bd[f]!==undefined);if(p.length>=10) corrs[f]=parseFloat(spearman(p.map(r=>r.bd[f]),p.map(r=>-r.fp)).toFixed(3));});
  const k=0.5,maxSw=0.4;const raw={};
  factors.forEach(f=>{const rho=corrs[f]||0;const mult=Math.max(1-maxSw,Math.min(1+maxSw,1+rho*k));raw[f]=(oldW[f]||1)*mult;});
  const rawSum=Object.values(raw).reduce((a,b)=>a+b,0);const newW={};
  factors.forEach(f=>newW[f]=Math.max(1,Math.round(raw[f]/rawSum*118)));
  const diff=118-Object.values(newW).reduce((a,b)=>a+b,0);
  if(diff){const big=factors.reduce((a,b)=>newW[a]>newW[b]?a:b);newW[big]+=diff;}
  let oldT3=0,newT3=0,total=0;
  races.forEach(race=>{
    const res=(race.results||[]).filter(r=>!r.non_runner&&!r.pull_out&&r.finish_pos);if(!res.length) return;
    const sw=(bd,w)=>factors.reduce((a,f)=>a+Math.min(bd[f]||0,w[f]||0),0);
    const os=[...res].sort((a,b)=>sw(b.score_breakdown||{},oldW)-sw(a.score_breakdown||{},oldW));
    const ns=[...res].sort((a,b)=>sw(b.score_breakdown||{},newW)-sw(a.score_breakdown||{},newW));
    const fs=race.field_size||res.length;const pl=getPlaceLimit(fs);
    total++;if(os[0].finish_pos<=pl)oldT3++;if(ns[0].finish_pos<=pl)newT3++;
  });
  return {profile,races:races.length,oldW,newW,corrs,oldPct:total?Math.round(oldT3/total*100):0,newPct:total?Math.round(newT3/total*100):0,total,factors};
}

async function runUnifiedCalibration(){

        ${res.factors.map(f=>{
          const o=res.oldW[f]||0,n=res.newW[f]||0,d=n-o;const rho=res.corrs[f]||0;
          const col=d>0?'var(--accent)':d<0?'#ef4444':'var(--muted)';const arrow=d>0?'↑':d<0?'↓':'–';

function rescoreRunnerWithWeights(runner,newW){
  // Rescore a runner using calibrated weight caps instead of default FM caps
  const bd=runner.score_breakdown;
  if(!bd) return runner.score;
  let total=0;
  Object.keys(bd).forEach(f=>{
    const cap=newW[f]!==undefined?newW[f]:(FM[f]?FM[f].mx:10);
    total+=Math.min(bd[f]||0,cap);
  });
  return total;
}

  // Rescore all runners in today's data that match the calibrated profile
  // Then regenerate and re-save today's Top 10 picks
  if(!D||!D.venues) return;
  const todayDate=D.date;
  Object.values(D.venues).forEach(venue=>{

      // Check if this race matches the calibrated profile
      const rp=classifyProfile(race.surface||race.going||'',race.race_type||race.type||'');
      if(rp!==profile&&profile!=='all') return;
      race.runners.forEach(runner=>{
        if(!runner.score_breakdown) return;
        const newScore=rescoreRunnerWithWeights(runner,newW);
        runner.score=newScore;
        // Recalculate confidence tier
        const pct=newScore/MAX_SCORE*100;
        runner.confidence=pct>=64?'TOP PICK':pct>=55?'STRONG':pct>=47?'SOLID':pct>=38?'MODERATE':pct>=30?'WEAK':'AVOID';
      });
    });
  });
  // Regenerate Top 10 picks with new scores
  const newPicks=getTop10Picks(D);
  saveTop10Picks(todayDate,newPicks);

  Object.keys(newW).forEach(f=>{if(FM[f]) FM[f].mx=newW[f];});
  // Recalculate MAX_SCORE — but keep it at 118 since weights redistribute, total stays same
}

function applyUnifiedCalibration(){
  const proposals=window._unifiedProposals||[];
  if(!proposals.length){closeModal();return;}
  let history=window._resultsHistory||{version:1,races:[],calibrations:[],weight_profiles:{}};
  history.calibrations=history.calibrations||[];
  history.weight_profiles=history.weight_profiles||{};
  const today=new Date().toISOString().slice(0,10);
  proposals.forEach(res=>{
    const oldW=history.weight_profiles[res.profile]||{};
    history.calibrations.push({date:today,profile:res.profile,races_used:res.races,old_weights:oldW,new_weights:res.newW,applied:true,correlations:res.corrs||{}});
    history.weight_profiles[res.profile]=res.newW;
    // Persist per-profile weights for next JSON load — NOT applied to today's already-loaded races
    try{localStorage.setItem('calibWeights_'+res.profile,JSON.stringify(res.newW));}catch(e){}
    // DO NOT rescore today's runners — today's analysis was done with old weights
    // New weights take effect on next JSON load via applyCalibratedWeightsToData()
  });
  window._resultsHistory=history;
  localStorage.setItem('resultsHistory',JSON.stringify(history));
  // Bump analysis version since weights changed
  const newVer=bumpAnalysisVersion();
  closeModal();
  updateStatus();
  renderPerformance();
  alert(ENGINE_NAME+' '+newVer.toFixed(1)+' saved — queued for next load.\n\nToday\'s races remain scored with current weights.\nNew weights will apply when you load tomorrow\'s JSON.');
}

function rejectUnifiedCalibration(){
  const proposals=window._unifiedProposals||[];
  let history=window._resultsHistory||{version:1,races:[],calibrations:[],weight_profiles:{}};
  history.calibrations=history.calibrations||[];
  const today=new Date().toISOString().slice(0,10);
  proposals.forEach(res=>{
    history.calibrations.push({date:today,profile:res.profile,races_used:res.races,old_weights:res.oldW,new_weights:res.newW,applied:false});
  });
  window._resultsHistory=history;
  localStorage.setItem('resultsHistory',JSON.stringify(history));
}

const EXCLUDED_VENUES=['happy valley','hexham','rosehill','flemington','oaklawn park','gulfstream park','meydan','sha tin','chukyo','saint-cloud','bahrain'];
function filterExcludedVenues(data){
  if(!data||!data.venues) return data;
  const filtered={...data,venues:{}};
  Object.entries(data.venues).forEach(([k,v])=>{
    const name=(v.course||k).toLowerCase();
    if(EXCLUDED_VENUES.some(ex=>name.includes(ex))) return; // skip
    filtered.venues[k]=v;
  });
  // Update venue count
  const rc=Object.values(filtered.venues).reduce((a,v)=>a+v.races.length,0);
  return filtered;
}

/* ==================== MULTI-DAY STORAGE ==================== */
function getAllDays(){
  try{const raw=localStorage.getItem('raceDays');return raw?JSON.parse(raw):{};}catch(e){return {};}
}
function saveDayData(data){
  if(!data||!data.date||!data.venues) return;
  // Hybrid storage: keep 5 recent days in cache, fetch older days from disk on-demand
  const MAX_STORED_DAYS=5;
  const days=getAllDays();
  days[data.date]=data;
  // Prune oldest days if over limit
  const dates=Object.keys(days).sort();
  while(dates.length>MAX_STORED_DAYS){ delete days[dates.shift()]; }
  try{
    localStorage.setItem('raceDays',JSON.stringify(days));
  }catch(e){
    // Quota exceeded — purge oldest days until it fits
    const remaining=Object.keys(days).sort();
    while(remaining.length>1){
      delete days[remaining.shift()];
      try{ localStorage.setItem('raceDays',JSON.stringify(days)); break; }catch(e2){}
    }
    if(remaining.length<=1){
      // Nuclear option: only keep current day
      localStorage.setItem('raceDays',JSON.stringify({[data.date]:data}));
    }
  }
  // Also keep legacy key for current day
  try{ localStorage.setItem('raceData',JSON.stringify(data)); }catch(e){}
}
async function fetchDayDataFromFile(date){
  // Fix 1: Validate date parameter at function start
  if (!date || typeof date !== 'string' || !/^\d{4}-\d{2}-\d{2}$/.test(date)) {
    console.warn('Invalid date format:', date);
    return null;
  }

  // Fetch race data from disk for dates outside 5-day cache
  const filename=`race_data/race_data_${date}.json`;

  // Fix 3: Add timeout handling
  let timeoutId;
  try{
    const controller=new AbortController();
    timeoutId=setTimeout(() => controller.abort(), 5000); // 5 second timeout
    const response=await fetch(filename, { signal: controller.signal });
    clearTimeout(timeoutId);
    if(!response.ok) return null;
    const data=await response.json();

    // Fix 2: Validate data structure and date match before caching
    if(data && data.date === date && data.venues && Object.keys(data.venues).length > 0){
      saveDayData(data);
    }
    return data;
  }catch(e){
    clearTimeout(timeoutId);
    if (e.name === 'AbortError') {
      console.warn(`Timeout fetching ${filename} (5s)`);
    } else if (e instanceof SyntaxError) {
      console.warn(`Invalid JSON in ${filename}:`, e);
    } else {
      console.warn(`Failed to fetch ${filename}:`, e);
    }
    return null;
  }
}
async function loadDayData(date){
  const days=getAllDays();
  // Check cache first
  if(days[date]) return days[date];
  // Not in cache — try to fetch from file
  const fetched=await fetchDayDataFromFile(date);
  return fetched||null;
}
function applyCalibratedWeightsToData(data){
  // Apply any persisted calibrated weights to rescore runners in the given data
  if(!data||!data.venues) return;
  ['aw','turf_flat','nh'].forEach(prf=>{
    try{
      const stored=localStorage.getItem('calibWeights_'+prf);
      if(!stored) return;
      const cw=JSON.parse(stored);
      Object.values(data.venues).forEach(venue=>{
        venue.races.forEach(race=>{
          const rp=classifyProfile(race.surface||race.going||'',race.race_type||race.type||'');
          if(rp!==prf) return;
          race.runners.forEach(runner=>{
            if(!runner.score_breakdown) return;
            runner.score=rescoreRunnerWithWeights(runner,cw);
            const pct=runner.score/MAX_SCORE*100;
            runner.confidence=pct>=64?'TOP PICK':pct>=55?'STRONG':pct>=47?'SOLID':pct>=38?'MODERATE':pct>=30?'WEAK':'AVOID';
          });
        });
      });
    }catch(e){}
  });
}

async function load(){
  // Migrate: if old raceData exists but raceDays doesn't, migrate it
  const oldStored=localStorage.getItem('raceData');
  const days=getAllDays();
  if(oldStored&&Object.keys(days).length===0){
    try{
      const parsed=JSON.parse(oldStored);
      if(parsed&&parsed.date&&parsed.venues){saveDayData(parsed);}
    }catch(e){}
  }

  // Priority: 1) localStorage (latest day), 2) fetch JSON file, 3) embedded sample
  const allDays=getAllDays();
  const sortedDates=Object.keys(allDays).sort().reverse();
  if(sortedDates.length>0){
    D=filterExcludedVenues(allDays[sortedDates[0]]);
    window._dataSource='stored';
  }else{
    try{
      const r=await fetch('daily_race_data.json?t='+Date.now());
      if(r.ok){
        const fetched=await r.json();
        if(fetched&&fetched.venues&&Object.keys(fetched.venues).length>0){
          D=filterExcludedVenues(fetched);window._dataSource='file';
          saveDayData(D);
        }else{D=filterExcludedVenues(EMBEDDED_DATA);window._dataSource='sample';}
      }else{throw new Error('not ok')}
    }catch(e){D=filterExcludedVenues(EMBEDDED_DATA);window._dataSource='sample';}
  }
  // Load results history BEFORE render so logged badges show correctly
  const storedHist=localStorage.getItem('resultsHistory');
  if(storedHist){try{window._resultsHistory=JSON.parse(storedHist);}catch(e){}}
  if(!window._resultsHistory){
    try{const rh=await fetch('results_history.json?t='+Date.now());if(rh.ok){window._resultsHistory=await rh.json();localStorage.setItem('resultsHistory',JSON.stringify(window._resultsHistory));}}catch(e){}
  }
  // Apply any persisted calibrated weights to rescore today's runners on load
  applyCalibratedWeightsToData(D);
  await render();
}
